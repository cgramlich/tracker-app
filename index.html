          <button className="btn btn-primary btn-sm" disabled={!custom} style={{flex:"0 0 auto"}} onClick={()=>custom&&snooze(custom)}>Set</button>
        </div>
      </div>
    </Sheet>
  );
}

function TodoRow({ store, todo, onOpen }){
  const done = todo.status==="done";
  const [snz,setSnz]=useState(false);
  const project = store.data.projects.find(p=>p.id===todo.projectId);
  const subDone = (todo.subtasks||[]).filter(s=>s.done).length;
  const dwait = todo.status==="waiting" ? waitingDays(todo) : null;            // days waiting (null if not waiting)
  const waitStale = dwait!=null && dwait >= waitThreshold(store);              // past the follow-up threshold
  function toggle(){
    if(!done){ store.completeTodo(todo); }       // completing: spawns next if recurring
    else { store.upsert("todos",{ id:todo.id, status:"next", completedAt:null }); } // un-completing: no spawn
  }
  return (
    <div className={"item"+(done?" done":"")}>
      <Check on={done} onClick={toggle}/>
      <div className="item-body" onClick={onOpen}>
        <div className="item-title">{todo.title}</div>
        <div className="item-meta">
          <TypeChip type={todo.type}/>
          {todo.starredToday && <span className="chip amber">{Ic.star}</span>}
          {todo.status!=="done" && todo.status!=="next" && todo.status!=="waiting" && <span className="chip">{todo.status}</span>}
          {todo.status==="waiting" && <span className={"chip "+(waitStale?"red":"")}>{Ic.clock} Waiting{dwait!=null?" "+dwait+"d":""}</span>}
          {todo.quad && <span className="chip amber">{QUADRANTS[todo.quad].label}</span>}
          {todo.due && <span className={"chip "+(isOverdue(todo.due)?"red":isToday(todo.due)?"amber":"")}>{isOverdue(todo.due)?"Overdue ":""}{fmtDate(todo.due)}</span>}
          {isDeferredAway(todo) && <span className="chip blue">{Ic.clock} {fmtDefer(todo.defer)}</span>}
          {todo.waitingOn && <span className="chip blue">waiting: {todo.waitingOn}</span>}
          {todo.location && <span className="chip green">{todo.location}</span>}
          {project && <span className="chip">{project.name}</span>}
          {todo.recur && todo.recur!=="none" && <span className="chip violet">{Ic.review} {todo.recur}</span>}
          {(todo.subtasks||[]).length>0 && <span className="chip">{subDone}/{todo.subtasks.length}</span>}
          {(todo.tags||[]).map(t=><span key={t} className="chip">#{t}</span>)}
        </div>
      </div>
      {!done && <button aria-label="Snooze" onClick={(e)=>{ e.stopPropagation(); setSnz(true); }}
        style={{flex:"0 0 auto",alignSelf:"center",background:"none",border:"none",color:"var(--ink-3)",padding:"6px 8px",cursor:"pointer"}}>
        <span style={{width:18,height:18,display:"inline-flex"}}>{Ic.clock}</span></button>}
      {snz && <SnoozeSheet store={store} todo={todo} onClose={()=>setSnz(false)}/>}
    </div>
  );
}

/* ============================================================
   CAPTURE - action sheet + quick add + AI flows
   ============================================================ */
function CaptureSheet({ store, onClose, toast, openEditor, openAI }){
  // Resume an unsaved review draft if one was left behind (survives close + reload).
  const initialPending = lsGet("pendingReview", []) || [];
  const [mode,setMode]=useState(initialPending.length ? "review" : "menu"); // menu | quick | brain | photo | review
  const [quick,setQuick]=useState("");
  const [busy,setBusy]=useState(false);
  const [brain,setBrain]=useState("");
  const [results,setResults]=useState(initialPending); // AI extracted items pending review
  const [err,setErr]=useState("");
  const fileRef = useRef(null);

  // WHY: persist the in-progress review so an accidental dismiss never throws away
  // AI work the user already paid an API call for. Cleared only on save or discard.
  useEffect(() => {
    if(results.length) lsSet("pendingReview", results); else lsDel("pendingReview");
  }, [results]);

  function quickAdd(){
    if(!quick.trim())return;
    store.upsert("todos",{ title:quick.trim(), status:"inbox", type:"", tags:[], subtasks:[] });
    toast("Added to Inbox"); setQuick("");
    log("NAV","quick-add to inbox");
  }
  async function runBrain(){
    if(!brain.trim())return;
    setBusy(true); setErr("");
    try{
      const items = await claudeExtract([{type:"text",text:"Turn this into tracker items:\n\n"+brain}]);
      setResults(items.map(x=>({ ...x, keep:true }))); setMode("review");
    }catch(e){ setErr(e.message); } finally{ setBusy(false); }
  }
  async function runPhoto(file){
    if(!file)return;
    setBusy(true); setErr(""); setMode("photo");
    try{
      const b64 = await resizeImage(file);
      const items = await claudeExtract([
        { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:b64 } },
        { type:"text", text:"Extract every task/idea written or shown in this image as tracker items." }
      ]);
      setResults(items.map(x=>({ ...x, keep:true }))); setMode("review");
    }catch(e){ setErr(e.message); setMode("photo"); } finally{ setBusy(false); }
  }
  function saveReview(){
    const keep = results.filter(r=>r.keep);
    const byFile = { todos:[], ideas:[], projects:[] };
    keep.forEach(r=>{
      if(r.type==="idea") byFile.ideas.push({ title:r.title, body:r.note||"", type:"", tags:[], state:"raw", capturedAt:nowISO() });
      else if(r.type==="project") byFile.projects.push({ name:r.title, type:"", status:"active", outcome:"", description:r.note||"", deadline:"", goalId:null });
      else byFile.todos.push({ title:r.title, status:r.suggestedStatus||"inbox", type:"", tags:[], notes:r.note||"", subtasks:[] });
    });
    Object.entries(byFile).forEach(([f,rows])=>{ if(rows.length) store.bulkAdd(f,rows); });
    lsDel("pendingReview");                  // explicit: unmount may pre-empt the effect
    setResults([]);
    toast("Added "+keep.length+" item"+(keep.length===1?"":"s")); onClose();
  }
  function discardDraft(){
    lsDel("pendingReview"); setResults([]); setMode("menu");
    toast("Draft discarded");
  }

  if(mode==="menu") return (
    <Sheet title="Capture" onClose={onClose}>
      {results.length>0 &&
        <button className="card" style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",
          borderColor:"var(--amber-line)",background:"var(--amber-dim)",marginTop:6,marginBottom:4}}
          onClick={()=>setMode("review")}>
          <span className="act-ic">{Ic.bolt}</span>
          <span className="act-txt"><b>Resume your review</b><span>{results.length} item{results.length===1?"":"s"} waiting - nothing saved yet</span></span>
        </button>}
      <div className="field" style={{marginTop:6}}>
        <span className="label" style={{color:"var(--amber)"}}>Brain-dump to AI</span>
        <textarea className="textarea" value={brain} onChange={e=>setBrain(e.target.value)} style={{minHeight:92}}
          placeholder="Talk or type everything on your mind - I'll turn it into todos, projects, and ideas, and help file your inbox..."/>
        <button className="btn btn-primary btn-block" style={{marginTop:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
          onClick={()=>{ const t=brain.trim(); if(t) lsSet("aiSeed", t); openAI(); }}>
          <span style={{width:18,height:18,display:"inline-flex"}}>{Ic.sparkle}</span> Organize with AI</button>
      </div>
      <div className="divider"></div>
      <div className="field">
        <div className="row">
          <input className="input" value={quick} onChange={e=>setQuick(e.target.value)} placeholder="Or quick-add one to Inbox..."
            onKeyDown={e=>e.key==="Enter"&&quickAdd()} style={{flex:3}}/>
          <button className="btn btn-primary btn-sm" onClick={quickAdd} style={{flex:1}}>Add</button>
        </div>
        <p className="hint">Type or dictate a single item. Triage from the Inbox later.</p>
      </div>
      <div className="divider"></div>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("todo"); }}>
        <span className="act-ic">{Ic.todo}</span><span className="act-txt"><b>New todo</b><span>Full form, all fields</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("idea"); }}>
        <span className="act-ic">{Ic.idea}</span><span className="act-txt"><b>New idea</b><span>A thought to sit on</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("project"); }}>
        <span className="act-ic">{Ic.project}</span><span className="act-txt"><b>New project</b><span>An outcome with many steps</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("goal"); }}>
        <span className="act-ic">{Ic.goal}</span><span className="act-txt"><b>New goal</b><span>Longer-term objective</span></span></button>
      <div className="divider"></div>
      <button className="act-row" onClick={()=>fileRef.current && fileRef.current.click()}>
        <span className="act-ic">{Ic.camera}</span><span className="act-txt"><b>Photo / scan</b><span>Read tasks from a picture</span></span></button>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={e=>{ const f=e.target.files[0]; e.target.value=""; runPhoto(f); }}/>
    </Sheet>
  );

  if(mode==="brain") return (
    <Sheet title="Brain dump" onClose={onClose}>
      <p className="hint" style={{marginBottom:10}}>Dump everything on your mind. Claude turns it into clean inbox items you review before saving.</p>
      <textarea className="textarea" style={{minHeight:160}} value={brain} onChange={e=>setBrain(e.target.value)}
        placeholder="call dentist, the salty tee box tech pack needs final colors, idea: subscription box, email BANA about the fee..." autoFocus/>
      {err && <p className="hint danger-text" style={{marginTop:8}}>{err}</p>}
      <button className="btn btn-primary btn-block" style={{marginTop:12}} disabled={busy} onClick={runBrain}>
        {busy? <span className="spin"></span> : "Structure it"}</button>
      <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={()=>setMode("menu")}>Back</button>
    </Sheet>
  );

  if(mode==="photo") return (
    <Sheet title="Photo / scan" onClose={onClose}>
      {busy ? <div className="center" style={{padding:"40px 0"}}><div className="spin" style={{margin:"0 auto 14px"}}></div>
        <p className="hint">Reading your image...</p></div> :
        <div>
          {err && <p className="hint danger-text" style={{marginBottom:10}}>{err}</p>}
          <button className="btn btn-primary btn-block" onClick={()=>fileRef.current && fileRef.current.click()}>Choose / take photo</button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
            onChange={e=>{ const f=e.target.files[0]; e.target.value=""; runPhoto(f); }}/>
          <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={()=>setMode("menu")}>Back</button>
        </div>}
    </Sheet>
  );

  if(mode==="review") return (
    <Sheet title={"Review "+results.length+" item"+(results.length===1?"":"s")} onClose={onClose}>
      <p className="hint" style={{marginBottom:12}}>Nothing saves until you confirm. Tap to toggle, edit titles inline.</p>
      {results.map((r,i)=>
        <div key={i} className={"rev-item"+(r.keep?"":" skip")}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <Check on={r.keep} onClick={()=>setResults(results.map((x,j)=>j===i?{...x,keep:!x.keep}:x))}/>
            <input className="input" value={r.title} style={{flex:1}}
              onChange={e=>setResults(results.map((x,j)=>j===i?{...x,title:e.target.value}:x))}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:8,paddingLeft:32}}>
            <select className="select" value={r.type} style={{flex:1}}
              onChange={e=>setResults(results.map((x,j)=>j===i?{...x,type:e.target.value}:x))}>
              <option value="todo">Todo</option><option value="idea">Idea</option><option value="project">Project</option></select>
          </div>
        </div>)}
      <button className="btn btn-primary btn-block" style={{marginTop:6}} onClick={saveReview}>Add kept items</button>
      <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={()=>setMode("menu")}>Keep for later</button>
      <button className="btn btn-danger btn-block" style={{marginTop:10}} onClick={discardDraft}>Discard these</button>
      <p className="hint center" style={{marginTop:10}}>"Keep for later" saves this as a draft you can resume from the + menu.</p>
    </Sheet>
  );
  return null;
}

/* ============================================================
   FILTER HELPERS
   ============================================================ */
// An item deferred to a future date is hidden everywhere until then.
const isDeferredAway = (t) => { if(!t.defer) return false; return (t.defer.length>10) ? (t.defer > snzNow()) : (t.defer > TODAY()); };
// Quadrant sort weight (Do First highest)
const quadWeight = (q) => ({q1:0,q3:1,q2:2,q4:3,"":4})[q||""];

function todayItems(todos){
  return todos.filter(t => t.status!=="done" && t.status!=="someday" && !isDeferredAway(t) &&
    ( isToday(t.due) || isOverdue(t.due) || t.starredToday || (t.defer && t.defer===TODAY()) ));
}
function sortTodos(a,b){
  const q = quadWeight(a.quad)-quadWeight(b.quad); if(q) return q;
  if(a.due && b.due) return a.due<b.due?-1:1; if(a.due) return -1; if(b.due) return 1;
  return 0;
}
// Natural (pre-manual) sorts, used once to seed each item's manual `order`.
function sortIdeas(a,b){ return (b.capturedAt||"").localeCompare(a.capturedAt||""); }
const PROJ_STATUS_ORDER = { active:0, onhold:1, someday:2, done:3, archived:4 };
function sortProjects(a,b){ return (PROJ_STATUS_ORDER[a.status]||0)-(PROJ_STATUS_ORDER[b.status]||0); }
function sortGoals(a,b){ return 0; }  // keep existing array order
const NAT_CMP = { todos:sortTodos, ideas:sortIdeas, projects:sortProjects, goals:sortGoals };
// Manual order: what drag-to-reorder controls. All items get a numeric `order` (seeded once).
function byOrder(a,b){ return (a.order==null?0:a.order)-(b.order==null?0:b.order); }
// Persist a single moved item's new position as the midpoint between its new neighbors.
function reorderItem(store, file, movedId, idsInOrder, items){
  const byId = {}; items.forEach(x=>{ byId[x.id]=x; });
  const idx = idsInOrder.indexOf(movedId);
  if(idx<0) return;
  const prev = idx>0 ? byId[idsInOrder[idx-1]] : null;
  const next = idx<idsInOrder.length-1 ? byId[idsInOrder[idx+1]] : null;
  const po = prev && typeof prev.order==="number" ? prev.order : null;
  const no = next && typeof next.order==="number" ? next.order : null;
  let ord;
  if(po!=null && no!=null) ord = (po+no)/2;
  else if(po!=null) ord = po+1000;
  else if(no!=null) ord = no-1000;
  else ord = 0;
  store.upsert(file, { id:movedId, order:ord });
  log("SAVE","reorder "+file+" -> order "+ord);
}

/* ============================================================
   VIEW: TODAY  (+ entry to Now/Focus)
   ============================================================ */
function TodayView({ store, onOpen, goNow, typeFilter, del }){
  let items = todayItems(store.data.todos).filter(t=>typeFilter==="all"||t.type===typeFilter).sort(sortTodos);
  const thr = waitThreshold(store);
  const followUps = store.data.todos
    .filter(t=>t.status==="waiting" && (typeFilter==="all"||t.type===typeFilter))
    .map(t=>({ t, d:waitingDays(t) }))
    .filter(x=>x.d!=null && x.d>=thr)
    .sort((a,b)=>b.d-a.d)
    .map(x=>x.t);
  const staleIdeas = store.data.ideas.filter(i=>{
    if(i.state==="promoted"||i.state==="discarded") return false;
    const age = (Date.now()-new Date(i.capturedAt||i.createdAt||Date.now()))/86400000;
    return age>=30;
  });
  const d = new Date();
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <div className="eyebrow">{d.toLocaleDateString(undefined,{weekday:"long"})}</div>
        <div className="topbar-row"><h1 className="title">Today</h1>
          <button className="btn btn-ghost btn-sm" onClick={goNow}>{Ic.now} Focus</button></div>
        <div className="subtle" style={{marginTop:2}}>{d.toLocaleDateString(undefined,{month:"long",day:"numeric"})}</div>
      </div>
      {followUps.length>0 &&
        <div style={{marginTop:14}}>
          <div className="label" style={{display:"flex",alignItems:"center",gap:6}}>{Ic.clock} Follow up - waiting {thr}+ days</div>
          <div className="list" style={{marginTop:8}}>{followUps.map(t=><SwipeRow key={t.id} onDelete={()=>del("todos",t)}><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/></SwipeRow>)}</div>
        </div>}
      {staleIdeas.length>0 &&
        <div className="card" style={{marginTop:14,borderColor:"var(--amber-line)",background:"var(--amber-dim)"}}>
          <b style={{fontFamily:"Fraunces",fontSize:15}}>Revisit your ideas</b>
          <p className="hint" style={{marginTop:4}}>{staleIdeas.length} idea{staleIdeas.length===1?"":"s"} untouched 30+ days. A quick review keeps the system trusted.</p>
        </div>}
      {items.length===0 ? <Empty glyph={"\u2600"} title="Nothing scheduled" sub="Star items for today, or set a due date."/> :
        <div className="list">{items.map(t=><SwipeRow key={t.id} onDelete={()=>del("todos",t)}><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/></SwipeRow>)}</div>}
    </div>
  );
}

/* ============================================================
   VIEW: NOW / FOCUS  (single next action)
   ============================================================ */
function NowView({ store, onOpen, back }){
  const candidates = store.data.todos
    .filter(t=>t.status==="next"||todayItems([t]).length>0)
    .filter(t=>t.status!=="done").sort(sortTodos);
  const [idx,setIdx]=useState(0);
  const t = candidates[idx];
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Now</h1>
      </div>
      {!t ? <Empty glyph={"\u25CB"} title="All clear" sub="No next action queued. Nice."/> :
        <div style={{marginTop:30}}>
          <div className="card" style={{padding:24,textAlign:"center"}}>
            <div className="subtle" style={{marginBottom:10}}>{t.quad?QUADRANTS[t.quad].label:"Next action"}</div>
            <h2 style={{fontSize:24,lineHeight:1.25}}>{t.title}</h2>
            {t.notes && <p className="hint" style={{marginTop:10}}>{t.notes}</p>}
          </div>
          <button className="btn btn-primary btn-block" style={{marginTop:18}}
            onClick={()=>{ store.completeTodo(t); setIdx(0); }}>Mark done</button>
          <div className="row" style={{marginTop:10}}>
            <button className="btn btn-ghost" onClick={()=>setIdx((idx+1)%candidates.length)}>Skip</button>
            <button className="btn btn-ghost" onClick={()=>onOpen(t)}>Edit</button>
          </div>
          <p className="hint center" style={{marginTop:14}}>{idx+1} of {candidates.length}</p>
        </div>}
    </div>
  );
}

/* ============================================================
   VIEW: LISTS  (GTD statuses, filterable)
   ============================================================ */
function ListsView({ store, onOpen, typeFilter, setTypeFilter, locFilter, setLocFilter, del }){
  const TABS = ["all", ...STATUS_ORDER];     // "all" = every active to-do in one list
  const [tab,setTab]=useState("all");
  const [sortMode,setSortMode]=useState(()=>lsGet("todoSort","manual")); // 'manual' = your drag order, 'smart' = priority/due
  useEffect(()=>{ lsSet("todoSort", sortMode); },[sortMode]);
  const [showDone,setShowDone]=useShowDone();  // show/hide completed on the combined "all" list
  const locs = knownLocations(store);
  // A location filter shows that place's items PLUS "anywhere" (blank) items - GTD contexts.
  const matchLoc = (t) => locFilter==="all" || !t.location || t.location===locFilter;
  const passType = (t) => typeFilter==="all"||t.type===typeFilter;
  const counts = {};
  counts.all = store.data.todos.filter(t=>t.status!=="done"&&passType(t)&&matchLoc(t)&&!isDeferredAway(t)).length;
  STATUS_ORDER.forEach(s=>{ counts[s]=store.data.todos.filter(t=>t.status===s&&passType(t)&&matchLoc(t)).length; });
  let items = store.data.todos
    .filter(t=> (tab==="all" ? t.status!=="done" : t.status===tab) && passType(t) && matchLoc(t))
    .filter(t=> (tab==="someday"||tab==="done") ? true : !isDeferredAway(t))
    .sort(sortMode==="smart" ? sortTodos : byOrder);
  // Completed to-dos for the "all" list: counted always (drives the toggle label),
  // but only rendered when "Show done" is on. Kept out of the DragList so completing
  // an item never disturbs the manual drag order of active work.
  const doneAll = store.data.todos.filter(t=>t.status==="done"&&passType(t)&&matchLoc(t)).sort(sortTodos);
  const doneItems = (tab==="all" && showDone) ? doneAll : [];
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <div className="eyebrow">Organize</div><h1 className="title">To-Dos</h1>
      </div>
      <div className="pills">
        {["all",...knownCategories(store)].map(f=><button key={f} className={"pill"+(typeFilter===f?" on":"")} onClick={()=>setTypeFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {locs.length>0 &&
        <div className="pills">
          <button className={"pill"+(locFilter==="all"?" on":"")} onClick={()=>setLocFilter("all")}>Any place</button>
          {locs.map(l=><button key={l} className={"pill"+(locFilter===l?" on":"")} onClick={()=>setLocFilter(l)}>{l}</button>)}
        </div>}
      <div className="tabs">
        {TABS.map(s=><button key={s} className={"tab"+(tab===s?" on":"")} onClick={()=>setTab(s)}>{s[0].toUpperCase()+s.slice(1)} {counts[s]>0&&<span style={{opacity:.6}}>{counts[s]}</span>}</button>)}
      </div>
      <div className="sortrow">
        <div className="seg">
          <button className={"seg-b"+(sortMode==="manual"?" on":"")} onClick={()=>setSortMode("manual")}>Manual</button>
          <button className={"seg-b"+(sortMode==="smart"?" on":"")} onClick={()=>setSortMode("smart")}>Smart</button>
        </div>
        <span className="sortlbl">{sortMode==="manual" ? "Your drag order - hold the grip to reorder" : "Auto: priority, then due date"}</span>
      </div>
      {tab==="all" && <DoneToggle showDone={showDone} setShowDone={setShowDone} n={doneAll.length}/>}
      {locFilter!=="all" && <p className="hint" style={{marginTop:8}}>Showing {locFilter} + any-place items.</p>}
      {items.length===0 && doneItems.length===0 ? <Empty glyph={"\u2014"} title={tab==="all"?"No to-dos yet":"No "+tab+" items"} sub={tab==="inbox"||tab==="all"?"Capture with the + button.":"Move items here as you organize."}/> :
        <>
          {items.length>0 && <DragList items={items} getId={t=>t.id} reorderable={sortMode==="manual"} onReorder={(id,ids)=>reorderItem(store,"todos",id,ids,items)} onDelete={t=>del("todos",t)}
            render={t=><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/>}/>}
          {doneItems.length>0 && <>
            <div className="sortlbl" style={{margin:"16px 4px 8px"}}>Completed</div>

/* ============================================================
   VIEW: WEEKLY REVIEW (lightweight guided checklist)
   Steps reset each session; tapping a step jumps to its view.
   ============================================================ */
function WeeklyReview({ store, back, go }){
  const [done,setDone]=useState({});
  const inbox = store.data.todos.filter(t=>t.status==="inbox").length;
  const waiting = store.data.todos.filter(t=>t.status==="waiting").length;
  const someday = store.data.todos.filter(t=>t.status==="someday").length;
  const noNext = store.data.projects.filter(p=>p.status==="active" &&
    store.data.todos.filter(t=>t.projectId===p.id&&t.status==="next").length===0).length;
  const steps = [
    { k:"inbox", b:"Process Inbox to zero", p:inbox+" item"+(inbox===1?"":"s")+" waiting", go:()=>go("lists") },
    { k:"next", b:"Review Next actions", p:"Still the right next steps?", go:()=>go("lists") },
    { k:"waiting", b:"Review Waiting-for", p:waiting+" item"+(waiting===1?"":"s")+" - nudge anyone?", go:()=>go("lists") },
    { k:"someday", b:"Review Someday / maybe", p:someday+" parked - anything ready to activate?", go:()=>go("lists") },
    { k:"projects", b:"Every active project has a next action", p:noNext>0? noNext+" project"+(noNext===1?"":"s")+" missing one":"All projects covered", go:()=>go("projects") },
    { k:"goals", b:"Glance at your goals", p:"Are projects still serving them?", go:()=>go("goals") },
  ];
  const completed = Object.values(done).filter(Boolean).length;
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Weekly Review</h1>
        <div className="subtle" style={{marginTop:2}}>{completed} of {steps.length} done - GTD's keystone habit</div>
      </div>
      <div className="steps">
        {steps.map((s,i)=>
          <div key={s.k} className={"step"+(done[s.k]?" done":"")}>
            <button className="step-n" onClick={()=>setDone({...done,[s.k]:!done[s.k]})}>{done[s.k]?Ic.check:i+1}</button>
            <div style={{flex:1}} onClick={s.go}><b>{s.b}</b><p>{s.p}</p></div>
          </div>)}
      </div>
      {completed===steps.length && <div className="card center" style={{marginTop:16,borderColor:"var(--amber-line)"}}>
        <b style={{fontFamily:"Fraunces",fontSize:17}}>Review complete</b><p className="hint" style={{marginTop:4}}>Mind like water. See you next week.</p></div>}
    </div>
  );
}

/* ============================================================
   EDITABLE LABEL ROW (shared by Locations + Categories editors)
   - Edits in a local buffer; commits on blur / Enter (so a rename is one
     deliberate change, not one per keystroke).
   - Commit cascades: every item tagged with the old value is relabeled.
   - Delete is by swiping the row left (no X button - swipe handles it).
   ============================================================ */
function EditableLabelRow({ value, color, count, onCommit, onRemove }){
  const [v,setV]=useState(value);
  const [confirm,setConfirm]=useState(false);
  useEffect(()=>{ setV(value); },[value]);
  const commit=()=>{ const t=v.trim(); if(!t || t===value){ setV(value); return; } onCommit(t); };
  return (
    <div style={{marginBottom:8}}>
      <SwipeRow onDelete={()=>setConfirm(true)}>
        <div className="row" style={{alignItems:"center",background:"var(--bg)"}}>
          {color && <span className="chip" style={{flex:"0 0 auto",background:color+"22",color,border:"1px solid "+color+"55"}}>{value||"?"}</span>}
          <input className="input" value={v} style={{flex:1}} aria-label="Rename" onChange={e=>setV(e.target.value)} onBlur={commit}
            onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}/>
        </div>
      </SwipeRow>
      {confirm && <Confirm
        text={count>0 ? ("Delete \""+value+"\"? It will be cleared from "+count+" item"+(count===1?"":"s")+" (they become uncategorized).")
                      : ("Delete \""+value+"\"?")}
        confirmLabel="Delete" onConfirm={()=>{ onRemove(); setConfirm(false); }} onCancel={()=>setConfirm(false)}/>}
    </div>
  );
}
// How many items currently carry a given category(type)/location value.
function countUses(store, field, val){
  let n=0; FILES.forEach(f=>(store.data[f]||[]).forEach(x=>{ if(x[field]===val) n++; })); return n;
}

/* ============================================================
   LOCATIONS EDITOR (manage GTD contexts, saved in config)
   ============================================================ */
function LocationsEditor({ store, toast, toastUndo }){
  const list = knownLocations(store);   // union: configured + any in use, so the editor matches the filter pills
  const cfgList = (store.cfg.locations && store.cfg.locations.length) ? store.cfg.locations : DEFAULT_LOCATIONS;
  const [adding,setAdding]=useState("");
  const [merge,setMerge]=useState(null);
  const [seed,setSeed]=useState(0);
  function persist(next){ store.saveCfg({ ...store.cfg, locations: next }); }
  function add(){
    const v = adding.trim(); if(!v) return;
    if(list.includes(v)){ toast("Already in the list"); return; }
    persist([...cfgList, v]); setAdding(""); log("NAV","location added");
  }
  function commit(old, v){
    if(old===v) return;
    if(list.includes(v)){ setMerge({from:old, to:v}); return; }
    persist(cfgList.includes(old) ? cfgList.map(x=>x===old?v:x) : [...cfgList, v]); // adopt in-use-but-unlisted names
    const n = store.relabel("location", old, v);
    toast(n>0 ? ("Renamed - updated "+n+" item"+(n===1?"":"s")) : "Renamed");
  }
  function doMerge(){
    const {from,to}=merge; const prevCfg=store.cfg;
    const affected=[]; FILES.forEach(f=>(store.data[f]||[]).forEach(x=>{ if(x.location===from) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==from));
    const n=store.relabel("location", from, to);
    setMerge(null); setSeed(s=>s+1);
    toastUndo("Merged \""+from+"\" into \""+to+"\""+(n?(" - "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);
      if(affected.length) store.restoreLabel("location", affected, from);
    });
  }
  function cancelMerge(){ setMerge(null); setSeed(s=>s+1); }
  function remove(val){
    const prevCfg = store.cfg;
    const affected = []; FILES.forEach(f => (store.data[f]||[]).forEach(x => { if(x.location===val) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==val));
    const n = store.relabel("location", val, "");
    toastUndo("Deleted \""+val+"\""+(n?(" - cleared "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);
      if(affected.length) store.restoreLabel("location", affected, val);
    });
  }
  return (
    <div>
      {list.map((l)=>
        <EditableLabelRow key={l+"|"+seed} value={l} count={countUses(store,"location",l)}
          onCommit={v=>commit(l,v)} onRemove={()=>remove(l)}/>)}
      <div className="row" style={{marginTop:6}}>
        <input className="input" value={adding} onChange={e=>setAdding(e.target.value)} placeholder="Add a place / context"
          onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:3}} autoCapitalize="words"/>
        <button className="btn btn-ghost btn-sm" onClick={add} style={{flex:1}}>Add</button>
      </div>
      <p className="hint" style={{marginTop:6}}>Tap a name to rename it (updates every todo using it). Rename one onto another's name to merge them. Swipe a row left to delete.</p>
      {merge && <Confirm
        text={"Merge \""+merge.from+"\" into \""+merge.to+"\"? Every todo tagged \""+merge.from+"\" becomes \""+merge.to+"\", and \""+merge.from+"\" is removed."}
        confirmLabel="Merge" onConfirm={doMerge} onCancel={cancelMerge}/>}
    </div>
  );
}

function CategoriesEditor({ store, toast, toastUndo }){
  const list = knownCategories(store);   // union: configured + any in use (e.g. one the AI coined), matches the filter pills
  const cfgList = (store.cfg.categories && store.cfg.categories.length) ? store.cfg.categories : DEFAULT_CATEGORIES;
  const [adding,setAdding]=useState("");
  const [merge,setMerge]=useState(null);   // {from, to} pending a confirm
  const [seed,setSeed]=useState(0);        // bump to remount rows (reset an edited input on cancel)
  function persist(next){ store.saveCfg({ ...store.cfg, categories: next }); }
  function add(){
    const v = adding.trim(); if(!v) return;
    if(list.includes(v)){ toast("Already in the list"); return; }
    persist([...cfgList, v]); setAdding(""); log("NAV","category added");
  }
  function commit(old, v){
    if(old===v) return;
    if(list.includes(v)){ setMerge({from:old, to:v}); return; }   // renamed onto an existing one -> offer to merge
    persist(cfgList.includes(old) ? cfgList.map(x=>x===old?v:x) : [...cfgList, v]); // adopt in-use-but-unlisted names
    const n = store.relabel("type", old, v);
    toast(n>0 ? ("Renamed - updated "+n+" item"+(n===1?"":"s")) : "Renamed");
  }
  function doMerge(){
    const {from,to}=merge; const prevCfg=store.cfg;
    const affected=[]; FILES.forEach(f=>(store.data[f]||[]).forEach(x=>{ if(x.type===from) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==from));
    const n=store.relabel("type", from, to);
    setMerge(null); setSeed(s=>s+1);
    toastUndo("Merged \""+from+"\" into \""+to+"\""+(n?(" - "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);
      if(affected.length) store.restoreLabel("type", affected, from);
    });
  }
  function cancelMerge(){ setMerge(null); setSeed(s=>s+1); }   // reset the row back to its old name
  function remove(val){
    const prevCfg = store.cfg;                       // snapshot for undo
    const affected = []; FILES.forEach(f => (store.data[f]||[]).forEach(x => { if(x.type===val) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==val));
    const n = store.relabel("type", val, "");        // clear it off every item
    toastUndo("Deleted \""+val+"\""+(n?(" - cleared "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);                         // put the category back...
      if(affected.length) store.restoreLabel("type", affected, val);   // ...and re-tag exactly those items
    });
  }
  return (
    <div>
      {list.map((l)=>
        <EditableLabelRow key={l+"|"+seed} value={l} color={catHue(l)} count={countUses(store,"type",l)}
          onCommit={v=>commit(l,v)} onRemove={()=>remove(l)}/>)}
      <div className="row" style={{marginTop:6}}>
        <input className="input" value={adding} onChange={e=>setAdding(e.target.value)} placeholder="Add a category"
          onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:3}} autoCapitalize="characters"/>
        <button className="btn btn-ghost btn-sm" onClick={add} style={{flex:1}}>Add</button>
      </div>
      <p className="hint" style={{marginTop:6}}>Tap a name to rename it (updates every item using it). Rename one onto another's name to merge them. Swipe a row left to delete. Colors are automatic.</p>
      {merge && <Confirm
        text={"Merge \""+merge.from+"\" into \""+merge.to+"\"? Every item tagged \""+merge.from+"\" becomes \""+merge.to+"\", and \""+merge.from+"\" is removed."}
        confirmLabel="Merge" onConfirm={doMerge} onCancel={cancelMerge}/>}
    </div>
  );
}

/* ============================================================
   VIEW: AI ORGANIZER (conversational; proposes a plan you approve)
   ============================================================ */
function AIChat({ store, toast, back }){
  const [messages,setMessages] = useState(() => lsGet("aiChat", []));   // {role:'user'|'assistant'|'system', text}
  const [plan,setPlan] = useState(() => lsGet("aiPlan", null));         // { ops:[...], excluded:[i,...] }
  const [input,setInput] = useState("");
  const [busy,setBusy] = useState(false);
  const [err,setErr] = useState("");
  const endRef = useRef(null);
  useEffect(() => { lsSet("aiChat", messages); }, [messages]);
  useEffect(() => { if(plan) lsSet("aiPlan", plan); else lsDel("aiPlan"); }, [plan]);
  useEffect(() => { if(endRef.current) endRef.current.scrollIntoView({block:"end"}); }, [messages, plan, busy]);
  // If we arrived here from the + brain-dump box, it left the text in 'aiSeed'. Send it.
  useEffect(() => {
    const seed = lsGet("aiSeed", ""); if(seed){ lsDel("aiSeed"); send(seed); }
  }, []); // eslint-disable-line

  async function send(textArg){
    const text = (typeof textArg==="string" ? textArg : input).trim(); if(!text || busy) return;
    setErr(""); setInput("");
    const history = [...messages, { role:"user", text }];
    setMessages(history); setBusy(true);
    try{
      // If a plan is already on the table, hand it to the AI so the user can ask to
      // revise specific items (and so a plain conversational turn doesn't lose it).
      const planCtx = (plan && plan.ops.length)
        ? "\n\nCURRENT PROPOSED PLAN (not yet applied). If the user asks to change, revise, drop, or reconsider any of these, return an UPDATED plan: keep the items they're happy with and adjust the ones they mention.\n" + JSON.stringify(plan.ops)
        : "";
      const system = ORGANIZE_SYSTEM + "\n\nCURRENT DATA (JSON):\n" + organizeSnapshot(store) + planCtx;
      // only user/assistant turns go to the API (skip our local 'system' confirmations)
      const apiMessages = history.filter(m=>m.role==="user"||m.role==="assistant").map(m=>({ role:m.role, content:m.text }));
      const raw = await claudeChat(system, apiMessages);
      let parsed = null; const cleaned = stripFences(raw);
      try{ parsed = JSON.parse(cleaned); }
      catch(e){
        const a = cleaned.indexOf("{"), b = cleaned.lastIndexOf("}");   // tolerate stray prose around the JSON
        if(a>=0 && b>a){ try{ parsed = JSON.parse(cleaned.slice(a,b+1)); }catch(_){ parsed = null; } }
      }
      if(!parsed || typeof parsed!=="object"){
        // purely conversational reply - keep any plan that's already on the table
        setMessages(m=>[...m, { role:"assistant", text: raw || "(no response)" }]);
      }else{
        const reply = parsed.reply || "Here's what I can do.";
        const ops = Array.isArray(parsed.plan) ? parsed.plan : [];
        setMessages(m=>[...m, { role:"assistant", text: reply }]);
        if(ops.length) setPlan({ ops, excluded:[] });   // a new/updated plan replaces the old; a no-plan turn leaves it intact
      }
    }catch(e){
      setErr(e.message || "Something went wrong.");
      setMessages(m=>[...m, { role:"system", text:"(error: "+(e.message||"failed")+")" }]);
    }
    setBusy(false);
  }

  function toggleOp(i){
    setPlan(p => { if(!p) return p; const ex = p.excluded.includes(i) ? p.excluded.filter(x=>x!==i) : [...p.excluded, i]; return { ...p, excluded:ex }; });
  }
  function applyPlan(){
    if(!plan) return;
    let included = plan.ops.filter((_,i)=>!plan.excluded.includes(i));
    const liveTmp = new Set(included.filter(o=>o.op==="create_project"&&o.tmpId).map(o=>o.tmpId));
    // if a project was excluded, don't leave its todos pointing at a dead tmpId
    included = included.map(o=>{
      if(o.op==="create_todo" && o.projectId && plan.ops.some(x=>x.op==="create_project"&&x.tmpId===o.projectId) && !liveTmp.has(o.projectId))
        return { ...o, projectId:null };
      return o;
    });
    if(!included.length){ toast("Nothing selected"); return; }
    const res = store.applyPlan(included);
    // Keep the UNSELECTED items on the table so you can refine or apply them next. A kept
    // todo that pointed at a project we just created can't resolve its tmpId anymore -> null it.
    const remaining = plan.ops.filter((_,i)=>plan.excluded.includes(i)).map(o=>{
      if(o.op==="create_todo" && o.projectId && liveTmp.has(o.projectId)) return { ...o, projectId:null };
      return o;
    });
    setPlan(remaining.length ? { ops: remaining, excluded: [] } : null);
    const tail = remaining.length ? " - "+remaining.length+" still here to refine or apply." : ".";
    setMessages(m=>[...m, { role:"system", text:"Applied "+res.created+" created"+(res.updated?", "+res.updated+" updated":"")+tail }]);
    toast(remaining.length ? "Applied selected" : "Plan applied");
  }
  function clearChat(){ setMessages([]); setPlan(null); setErr(""); lsDel("aiChat"); lsDel("aiPlan"); }

  function opLabel(o){
    if(o.op==="create_project") return ["New project", o.name||"(untitled)"];
    if(o.op==="create_goal")    return ["New goal", o.name||"(untitled)"];
    if(o.op==="create_idea")    return ["New idea", o.title||"(untitled)"];
    if(o.op==="create_todo"){
      const bits=[ (o.status&&o.status!=="inbox")?o.status:null, o.type||null,
        (o.quad&&QUADRANTS[o.quad])?QUADRANTS[o.quad].label:null, o.due?("due "+o.due):null,
        o.location?("@"+o.location):null, o.projectId?"in project":null ].filter(Boolean);
      return ["New todo", (o.title||"(untitled)") + (bits.length?"  ("+bits.join(", ")+")":"")];
    }
    if(o.op==="update_todo"){
      const t = store.data.todos.find(x=>x.id===o.id); const name = t?t.title:("#"+o.id);
      const ch=[]; ["status","type","due","location"].forEach(k=>{ if(o[k]!==undefined) ch.push(k+"="+o[k]); });
      if(o.quad!==undefined) ch.push("priority="+(QUADRANTS[o.quad]?QUADRANTS[o.quad].label:o.quad));
      if(o.projectId!==undefined) ch.push("project");
      if(o.tags!==undefined) ch.push("tags");
      return ["Update", name + (ch.length?"  ("+ch.join(", ")+")":"")];
    }
    return [o.op, ""];
  }

  const empty = messages.length===0;
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        {messages.length>0 && <button className="btn btn-ghost btn-sm" onClick={clearChat} style={{marginLeft:"auto"}}>Clear</button>}
        <h1 className="title" style={{marginTop:8,width:"100%"}}>Organize with AI</h1>
      </div>

      {empty &&
        <p className="hint" style={{marginTop:10}}>Dump whatever's on your mind. I'll suggest todos, projects, and how to file your inbox - then you approve before anything is saved. Nothing changes until you tap Apply.</p>}

      <div className="chat-scroll">
        {messages.map((m,i)=> <div key={i} className={"bubble "+(m.role==="user"?"user":m.role==="assistant"?"ai":"sys")}>{m.text}</div>)}
        {busy && <div className="bubble ai" style={{color:"var(--ink-3)"}}>Thinking...</div>}
        {plan && plan.ops.length>0 &&
          <div className="plan-card">
            <div className="label" style={{marginBottom:6}}>Proposed plan - tap an item to deselect it. Apply adds the selected ones; the rest stay here to refine.</div>
            {plan.ops.map((o,i)=>{ const [k,txt]=opLabel(o); const off=plan.excluded.includes(i);
              return <div key={i} className={"plan-op"+(off?" off":"")} onClick={()=>toggleOp(i)}>
                <span className="plan-ck" style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:6,flex:"0 0 auto",border:"1.5px solid "+(off?"var(--line-2)":"var(--amber)"),background:off?"transparent":"var(--amber-dim)"}}>{!off && Ic.check}</span>
                <span style={{flex:1}}><span className="pl-k">{k}</span><br/>{txt}</span>
              </div>; })}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="btn btn-primary btn-block" onClick={applyPlan} disabled={busy}>Apply {plan.ops.length-plan.excluded.length} selected</button>
              <button className="btn btn-ghost" onClick={()=>setPlan(null)}>Dismiss</button>
            </div>
          </div>}
      </div>
      {err && <p className="hint" style={{color:"var(--danger,#d9744f)",marginTop:2}}>{err}</p>}
      <div className="chat-bar">
        <textarea className="textarea" value={input} onChange={e=>setInput(e.target.value)}
          placeholder={empty ? "Talk or type a brain-dump... e.g. 'Start a kitchen reno project and add these todos...'" : "Type your reply..."}
          style={{minHeight:54,flex:1}} onKeyDown={e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); send(); } }}/>
        <button className="btn btn-primary" onClick={send} disabled={busy} style={{flex:"0 0 auto"}}>{busy?"...":"Send"}</button>
      </div>
      <div ref={endRef}></div>
    </div>
  );
}

function ExportView({ store, toast, back }){
  const appName = (store.cfg.appName||"Priority Captain");
  const fname = (ext) => (appName.replace(/[^a-z0-9]+/ig,"-").replace(/^-+|-+$/g,"").toLowerCase() || "tracker")+"-export."+ext;
  function download(name, text, mime){
    const blob = new Blob([text],{type:mime});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  const projName = () => { const m={}; (store.data.projects||[]).forEach(p=>{ m[p.id]=p.name; }); return m; };

  // ---- builders (one per format) ----------------------------------
  function buildText(){
    const d = store.data; const pn = projName(); const L = [];
    L.push(appName.toUpperCase()+" EXPORT"); L.push(new Date().toString());
    const todoLine = (t)=>{
      const bits = [];
      if(t.type) bits.push(t.type);
      if(t.quad && QUADRANTS[t.quad]) bits.push(QUADRANTS[t.quad].label);
      if(t.due) bits.push("due "+t.due);
      if(t.defer) bits.push("defer "+t.defer);
      if(t.location) bits.push("@"+t.location);
      if(t.projectId && pn[t.projectId]) bits.push("project: "+pn[t.projectId]);
      if(t.waitingOn) bits.push("waiting: "+t.waitingOn);
      const tags = (t.tags||[]).map(x=>"#"+x).join(" ");
      const meta = (bits.length||tags) ? "  ("+[bits.join(", "), tags].filter(Boolean).join("; ")+")" : "";
      let s = "  ["+(t.status==="done"?"x":" ")+"] "+t.title+meta;
      (t.subtasks||[]).forEach(st=>{ s += "\n      - ["+(st.done?"x":" ")+"] "+st.title; });
      return s;
    };
    L.push(""); L.push("== TODOS ==");
    STATUS_ORDER.forEach(st=>{
      const rows = (d.todos||[]).filter(t=>t.status===st);
      if(!rows.length) return;
      L.push(""); L.push("-- "+st.toUpperCase()+" ("+rows.length+") --");
      rows.forEach(t=>L.push(todoLine(t)));
    });
    L.push(""); L.push("== PROJECTS ==");
    (d.projects||[]).forEach(p=>{
      L.push("");
      L.push("* "+p.name+"  ("+[p.type, p.status, p.deadline?("due "+p.deadline):""].filter(Boolean).join(", ")+")");
      if(p.outcome) L.push("    Outcome: "+p.outcome);
      if(p.description) L.push("    "+p.description.replace(/\n/g," "));
      (d.todos||[]).filter(t=>t.projectId===p.id).forEach(t=>L.push("    ["+(t.status==="done"?"x":" ")+"] "+t.title));
    });
    L.push(""); L.push("== IDEAS ==");
    (d.ideas||[]).forEach(i=>{
      L.push("");
      L.push("* "+i.title+"  ("+[i.type, i.state].filter(Boolean).join(", ")+")");
      if(i.body) L.push("    "+i.body.replace(/\n/g," "));
    });
    L.push(""); L.push("== GOALS ==");
    (d.goals||[]).forEach(g=>{
      const projs = (d.projects||[]).filter(p=>p.goalId===g.id).map(p=>p.name);
      L.push("");
      L.push("* "+g.name+"  ("+[g.type, g.status, g.target?("target "+g.target):""].filter(Boolean).join(", ")+")");
      if(g.why) L.push("    Why: "+g.why.replace(/\n/g," "));
      if(projs.length) L.push("    Projects: "+projs.join(", "));
    });
    return L.join("\n");
  }

  function buildMarkdown(){
    const d = store.data; const pn = projName();
    const L = ["# "+appName+" export","","_"+new Date().toLocaleString()+"_"];
    const line = (t)=>{
      const bits = [];
      if(t.type) bits.push(t.type);
      if(t.quad && QUADRANTS[t.quad]) bits.push(QUADRANTS[t.quad].label);
      if(t.due) bits.push("due "+t.due);
      if(t.defer) bits.push("defer "+t.defer);
      if(t.location) bits.push("@"+t.location);
      if(t.projectId && pn[t.projectId]) bits.push("project: "+pn[t.projectId]);
      if(t.waitingOn) bits.push("waiting: "+t.waitingOn);
      const tags = (t.tags||[]).map(x=>"#"+x).join(" ");
      const meta = (bits.length||tags) ? " _("+[bits.join(", "), tags].filter(Boolean).join("; ")+")_" : "";
      let s = "- ["+(t.status==="done"?"x":" ")+"] "+t.title+meta;
      (t.subtasks||[]).forEach(st=>{ s += "\n  - ["+(st.done?"x":" ")+"] "+st.title; });
      return s;
    };
    L.push(""); L.push("## Todos");
    STATUS_ORDER.forEach(st=>{
      const rows = (d.todos||[]).filter(t=>t.status===st);
      if(!rows.length) return;
      L.push(""); L.push("### "+st.toUpperCase()+" ("+rows.length+")");
      rows.forEach(t=>L.push(line(t)));
    });
    if((d.projects||[]).length){ L.push(""); L.push("## Projects");
      (d.projects||[]).forEach(p=>{
        L.push(""); L.push("### "+p.name);
        L.push("_"+[p.type, p.status, p.deadline?("due "+p.deadline):""].filter(Boolean).join(" - ")+"_");
        if(p.outcome) L.push("**Outcome:** "+p.outcome);
        if(p.description) L.push(p.description);
        (d.todos||[]).filter(t=>t.projectId===p.id).forEach(t=>L.push("- ["+(t.status==="done"?"x":" ")+"] "+t.title));
      });
    }
    if((d.ideas||[]).length){ L.push(""); L.push("## Ideas");
      (d.ideas||[]).forEach(i=>L.push("- **"+i.title+"** _("+[i.type,i.state].filter(Boolean).join(", ")+")_"+(i.body?"  \n  "+i.body.replace(/\n/g," "):"")));
    }
    if((d.goals||[]).length){ L.push(""); L.push("## Goals");
      (d.goals||[]).forEach(g=>{
        const projs = (d.projects||[]).filter(p=>p.goalId===g.id).map(p=>p.name);
        L.push("- **"+g.name+"** _("+[g.type,g.status,g.target?("target "+g.target):""].filter(Boolean).join(", ")+")_"
          +(g.why?"  \n  Why: "+g.why.replace(/\n/g," "):"")+(projs.length?"  \n  Projects: "+projs.join(", "):""));
      });
    }
    return L.join("\n");
  }

  function buildCSV(){
    const d = store.data; const pn = projName();
    const cell = (v)=>{ v=(v==null?"":String(v)); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
    const rows = [["Kind","Title","Category","Status","Priority","Due","Defer","Location","Project","Tags","Notes"]];
    (d.todos||[]).forEach(t=>rows.push(["Todo",t.title,t.type,t.status,
      (t.quad&&QUADRANTS[t.quad]?QUADRANTS[t.quad].label:""),t.due,t.defer,t.location,
      (t.projectId?pn[t.projectId]:""),(t.tags||[]).join(" "),t.notes]));
    (d.ideas||[]).forEach(i=>rows.push(["Idea",i.title,i.type,i.state,"","","","","",(i.tags||[]).join(" "),i.body]));
    (d.projects||[]).forEach(p=>rows.push(["Project",p.name,p.type,p.status,"",p.deadline,"","","","",
      (p.outcome?("Outcome: "+p.outcome+(p.description?" | "+p.description:"")):(p.description||""))]));
    (d.goals||[]).forEach(g=>rows.push(["Goal",g.name,g.type,g.status,"",g.target,"","","","",g.why]));
    return rows.map(r=>r.map(cell).join(",")).join("\r\n");
  }

  function buildPrintHTML(){
    const d = store.data; const pn = projName();
    let h = "<h1>"+esc(appName)+" export</h1><p class=date>"+esc(new Date().toLocaleString())+"</p>";
    h += "<h2>Todos</h2>";
    let any=false;
    STATUS_ORDER.forEach(st=>{
      const rows=(d.todos||[]).filter(t=>t.status===st); if(!rows.length) return; any=true;
      h += "<h3>"+esc(st.toUpperCase())+" ("+rows.length+")</h3><ul>";
      rows.forEach(t=>{
        const bits=[]; if(t.type)bits.push(t.type); if(t.quad&&QUADRANTS[t.quad])bits.push(QUADRANTS[t.quad].label);
        if(t.due)bits.push("due "+t.due); if(t.location)bits.push("@"+t.location);
        if(t.projectId&&pn[t.projectId])bits.push(pn[t.projectId]);
        const meta = bits.length ? " <span class=meta>("+esc(bits.join(", "))+")</span>" : "";
        h += "<li>"+(t.status==="done"?"&#9745; ":"&#9744; ")+esc(t.title)+meta;
        if((t.subtasks||[]).length){ h+="<ul>"; t.subtasks.forEach(s=>h+="<li>"+(s.done?"&#9745; ":"&#9744; ")+esc(s.title)+"</li>"); h+="</ul>"; }
        h += "</li>";
      });
      h += "</ul>";
    });
    if(!any) h += "<p class=meta>No todos.</p>";
    if((d.projects||[]).length){ h+="<h2>Projects</h2>";
      (d.projects||[]).forEach(p=>{ h+="<h3>"+esc(p.name)+"</h3><p class=meta>"+esc([p.type,p.status,p.deadline?("due "+p.deadline):""].filter(Boolean).join(" - "))+"</p>";
        if(p.outcome)h+="<p><b>Outcome:</b> "+esc(p.outcome)+"</p>"; if(p.description)h+="<p>"+esc(p.description)+"</p>"; }); }
    if((d.ideas||[]).length){ h+="<h2>Ideas</h2><ul>";
      (d.ideas||[]).forEach(i=>h+="<li><b>"+esc(i.title)+"</b> <span class=meta>("+esc([i.type,i.state].filter(Boolean).join(", "))+")</span>"+(i.body?"<br>"+esc(i.body):"")+"</li>"); h+="</ul>"; }
    if((d.goals||[]).length){ h+="<h2>Goals</h2><ul>";
      (d.goals||[]).forEach(g=>h+="<li><b>"+esc(g.name)+"</b> <span class=meta>("+esc([g.type,g.status,g.target?("target "+g.target):""].filter(Boolean).join(", "))+")</span>"+(g.why?"<br>"+esc(g.why):"")+"</li>"); h+="</ul>"; }
    return "<!doctype html><html><head><meta charset=utf-8><title>"+esc(appName)+" export</title><style>"
      +"body{font:14px/1.55 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;max-width:760px;margin:32px auto;padding:0 22px;}"
      +"h1{font-size:24px;margin:0 0 2px;}.date{color:#888;margin:0 0 18px;}"
      +"h2{margin:24px 0 6px;border-bottom:1px solid #ddd;padding-bottom:4px;font-size:18px;}"
      +"h3{margin:14px 0 4px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.05em;}"
      +"ul{margin:4px 0 10px;padding-left:22px;}li{margin:3px 0;}.meta{color:#999;font-size:12px;}"
      +"@media print{body{margin:0;}a{color:inherit;}}</style></head><body>"+h+"</body></html>";
  }

  // ---- actions ----------------------------------------------------
  async function copyText(){
    const text = buildText();
    try{
      await navigator.clipboard.writeText(text);
      toast("Copied to clipboard"); log("NAV","copied text "+text.length+" chars");
    }catch(e){
      log("ERROR","clipboard: "+(e.message||e)); download(fname("txt"), text, "text/plain");
      toast("Clipboard blocked - downloaded instead");
    }
  }
  // Mobile-friendly: native share sheet (Notes/Mail/Messages); desktop falls back to a download.
  async function shareText(){
    const text = buildText();
    if(navigator.share){
      try { await navigator.share({ title:appName+" export", text }); log("NAV","shared text"); return; }
      catch(e){ if(e.name==="AbortError") return; log("ERROR","share: "+e.message); }
    }
    download(fname("txt"), text, "text/plain"); log("NAV","downloaded text");
  }
  function exportMarkdown(){ download(fname("md"), buildMarkdown(), "text/markdown"); toast("Markdown downloaded"); log("NAV","export md"); }
  function exportCSV(){ download(fname("csv"), buildCSV(), "text/csv"); toast("CSV downloaded"); log("NAV","export csv"); }
  function exportData(){ download(fname("json"), JSON.stringify(store.data,null,2), "application/json"); toast("JSON downloaded"); log("NAV","export json"); }
  function printDoc(){
    const w = window.open("", "_blank");
    if(!w){ toast("Allow pop-ups to print / save as PDF"); log("ERROR","print: popup blocked"); return; }
    w.document.open(); w.document.write(buildPrintHTML()); w.document.close(); w.focus();
    setTimeout(()=>{ try{ w.print(); }catch(e){ log("ERROR","print: "+e.message); } }, 350);
    log("NAV","print");
  }

  const Row = ({ic,b,s,onClick}) => (
    <button className="act-row" onClick={onClick}>
      <span className="act-ic">{ic}</span><span className="act-txt"><b>{b}</b><span>{s}</span></span></button>
  );
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Export</h1>
      </div>
      <p className="hint" style={{marginTop:8}}>Get your data out anytime. This reads only what is on this device.</p>

      <span className="label" style={{marginTop:14,display:"block"}}>Read &amp; share</span>
      <Row ic={Ic.lists}   b="Copy to clipboard"     s="Readable text - paste anywhere" onClick={copyText}/>
      <Row ic={Ic.review}  b="Share / save as text"  s="Phone share sheet, or .txt on desktop" onClick={shareText}/>
      <Row ic={Ic.idea}    b="Download as Markdown"   s="Formatted .md for Notion, Obsidian, docs" onClick={exportMarkdown}/>
      <Row ic={Ic.today}   b="Print / Save as PDF"    s="Opens a clean printable page" onClick={printDoc}/>

      <span className="label" style={{marginTop:18,display:"block"}}>Spreadsheet &amp; backup</span>
      <Row ic={Ic.matrix}  b="Download as CSV"        s="Open in Excel, Numbers, or Sheets" onClick={exportCSV}/>
      <Row ic={Ic.project} b="Download data (JSON)"   s="Full machine-readable backup" onClick={exportData}/>
    </div>
  );
}

function SearchView({ store, openEditor, back }){
  const [q,setQ]=useState("");
  const term = q.trim().toLowerCase();
  const has = (...vals) => vals.filter(Boolean).some(v=>String(v).toLowerCase().includes(term));
  let todos=[], ideas=[], projects=[], goals=[];
  if(term){
    todos    = store.data.todos.filter(t=>has(t.title, t.notes, (t.tags||[]).join(" "), t.location, t.waitingOn));
    projects = store.data.projects.filter(p=>has(p.name, p.outcome, p.description));
    ideas    = store.data.ideas.filter(i=>has(i.title, i.body, (i.tags||[]).join(" ")));
    goals    = store.data.goals.filter(g=>has(g.name, g.why));
  }
  const total = todos.length+projects.length+ideas.length+goals.length;
  const Section = ({title, rows, kind, label, sub}) => rows.length ? (
    <div style={{marginTop:18}}>
      <div className="eyebrow">{title} ({rows.length})</div>
      <div className="list">{rows.map(r=>
        <div key={r.id} className="item" onClick={()=>openEditor(kind, r)}>
          <div className="item-body"><div className="item-title">{label(r)}</div>
            <div className="item-meta"><TypeChip type={r.type}/>{sub(r)}</div></div>
        </div>)}</div>
    </div>
  ) : null;
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Search</h1>
      </div>
      <input className="input" style={{marginTop:14}} value={q} onChange={e=>setQ(e.target.value)}
        placeholder="Search todos, ideas, projects, goals..." autoFocus/>
      {term && total===0 && <Empty glyph={"\u2014"} title="No matches" sub="Try a different word."/>}
      {todos.length>0 &&
        <div style={{marginTop:18}}>
          <div className="eyebrow">Todos ({todos.length})</div>
          <div className="list">{todos.map(t=><TodoRow key={t.id} store={store} todo={t} onOpen={()=>openEditor("todo", t)}/>)}</div>
        </div>}
      <Section title="Projects" rows={projects} kind="project" label={r=>r.name}  sub={r=><span className="chip">{r.status}</span>}/>
      <Section title="Ideas"    rows={ideas}    kind="idea"    label={r=>r.title} sub={r=><span className="chip">{r.state}</span>}/>
      <Section title="Goals"    rows={goals}    kind="goal"    label={r=>r.name}  sub={r=><span className="chip">{r.status}</span>}/>
    </div>
  );
}

/* ============================================================
   FIRST-RUN SETUP
   ============================================================ */
function Login({ store, toast }){
  const [mode,setMode]=useState("signin");   // signin | signup
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [sent,setSent]=useState(false);       // signup confirmation email sent
  const [resetSent,setResetSent]=useState(false); // password-reset email sent
  const isSignup = mode==="signup";
  async function submit(){
    setErr("");
    if(!email.trim()||!password){ setErr("Email and password are required."); return; }
    if(isSignup && password.length<6){ setErr("Password must be at least 6 characters."); return; }
    setBusy(true);
    try{
      if(isSignup){
        const { needsConfirm } = await store.signUp(email, password);
        if(needsConfirm) setSent(true);          // email confirmation flow
        else toast("Account created");           // (only if confirmation is off)
      }else{
        await store.signIn(email, password); toast("Signed in");
      }
    }catch(e){ setErr(e.message||"Something went wrong."); }
    finally{ setBusy(false); }
  }

  async function forgot(){
    setErr("");
    if(!email.trim()){ setErr("Enter your email above first, then tap Forgot password."); return; }
    setBusy(true);
    try{ await store.requestReset(email); setResetSent(true); }
    catch(e){ setErr(e.message||"Couldn't send the reset email."); }
    finally{ setBusy(false); }
  }

  // After "Forgot password?": tell them to check their inbox for the reset link.
  if(resetSent){
    return (
      <div className="app"><div className="screen">
        <div style={{paddingTop:"calc(env(safe-area-inset-top) + 40px)"}}>
          <div className="eyebrow">Reset password</div>
          <h1 className="title" style={{fontSize:30,marginTop:4}}>Check your email</h1>
          <p className="hint" style={{marginTop:10,fontSize:14}}>
            We sent a password-reset link to <b>{email.trim()}</b>. Tap it and you'll be able to set a new password.
          </p>
        </div>
        <button className="btn btn-ghost btn-block" style={{marginTop:20}}
          onClick={()=>{ setResetSent(false); setErr(""); }}>Back to sign in</button>
        <p className="hint" style={{textAlign:"center",marginTop:16,opacity:.6}}>build {BUILD}</p>
      </div></div>
    );
  }

  // After signup with email confirmation on: tell them to go check their inbox.
  if(sent){
    return (
      <div className="app"><div className="screen">
        <div style={{paddingTop:"calc(env(safe-area-inset-top) + 40px)"}}>
          <div className="eyebrow">Almost there</div>
          <h1 className="title" style={{fontSize:30,marginTop:4}}>Check your email</h1>
          <p className="hint" style={{marginTop:10,fontSize:14}}>
            We sent a confirmation link to <b>{email.trim()}</b>. Tap it to activate your account,
            then come back here and sign in.
          </p>
        </div>
        <button className="btn btn-ghost btn-block" style={{marginTop:20}}
          onClick={()=>{ setSent(false); setMode("signin"); setPassword(""); setErr(""); }}>Back to sign in</button>
        <p className="hint" style={{textAlign:"center",marginTop:16,opacity:.6}}>build {BUILD}</p>
      </div></div>
    );
  }

  return (
    <div className="app"><div className="screen">
      <div style={{paddingTop:"calc(env(safe-area-inset-top) + 40px)"}}>
        <div className="eyebrow">{isSignup?"Get started":"Welcome back"}</div>
        <h1 className="title" style={{fontSize:34,marginTop:4}}>Priority Captain</h1>
        <p className="hint" style={{marginTop:8,fontSize:14}}>
          {isSignup ? "Create an account to sync your todos, ideas, projects, and goals across your devices."
                    : "Sign in to sync your todos, ideas, projects, and goals across your devices."}
        </p>
      </div>
      <div className="card" style={{marginTop:20}}>
        <div className="field"><span className="label">Email</span>
          <input className="input" type="email" value={email} autoCapitalize="off" autoCorrect="off"
            onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
            onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/></div>
        <div className="field"><span className="label">Password</span>
          <input className="input" type="password" value={password} autoCapitalize="off"
            onChange={e=>setPassword(e.target.value)} placeholder={isSignup?"At least 6 characters":"Your password"}
            onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/></div>
        {err && <p className="hint danger-text">{err}</p>}
        <button className="btn btn-primary btn-block" style={{marginTop:6}} disabled={busy} onClick={submit}>
          {busy? <span className="spin"></span> : (isSignup?"Create account":"Sign in")}</button>
      </div>
      <button className="btn btn-ghost btn-block" style={{marginTop:12}} disabled={busy}
        onClick={()=>{ setErr(""); setMode(isSignup?"signin":"signup"); }}>
        {isSignup ? "Already have an account? Sign in" : "New here? Create an account"}</button>
      {!isSignup &&
        <button disabled={busy} onClick={forgot}
          style={{display:"block",margin:"14px auto 0",background:"none",border:"none",color:"var(--ink-3)",fontSize:13,textDecoration:"underline",cursor:"pointer"}}>
          Forgot password?</button>}
      <p className="hint" style={{textAlign:"center",marginTop:16,opacity:.6}}>build {BUILD}</p>
    </div></div>
  );
}

function SetPassword({ store, toast }){
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  async function submit(){
    setErr("");
    if(password.length<6){ setErr("Password must be at least 6 characters."); return; }
    if(password!==confirm){ setErr("The two passwords don't match."); return; }
    setBusy(true);
    try{ await store.updatePassword(password); toast("Password updated"); }
    catch(e){ setErr(e.message||"Couldn't update the password."); }
    finally{ setBusy(false); }
  }
  return (
    <div className="app"><div className="screen">
      <div style={{paddingTop:"calc(env(safe-area-inset-top) + 40px)"}}>
        <div className="eyebrow">Reset password</div>
        <h1 className="title" style={{fontSize:30,marginTop:4}}>Set a new password</h1>
        <p className="hint" style={{marginTop:8,fontSize:14}}>Choose a new password for <b>{store.authEmail||"your account"}</b>.</p>
      </div>
      <div className="card" style={{marginTop:20}}>
        <div className="field"><span className="label">New password</span>
          <input className="input" type="password" value={password} autoCapitalize="off"
            onChange={e=>setPassword(e.target.value)} placeholder="At least 6 characters"/></div>
        <div className="field"><span className="label">Confirm new password</span>
          <input className="input" type="password" value={confirm} autoCapitalize="off"
            onChange={e=>setConfirm(e.target.value)} placeholder="Re-enter it"
            onKeyDown={e=>{ if(e.key==="Enter") submit(); }}/></div>
        {err && <p className="hint danger-text">{err}</p>}
        <button className="btn btn-primary btn-block" style={{marginTop:6}} disabled={busy} onClick={submit}>
          {busy? <span className="spin"></span> : "Update password"}</button>
      </div>
      <p className="hint" style={{textAlign:"center",marginTop:16,opacity:.6}}>build {BUILD}</p>
    </div></div>
  );
}

/* ============================================================
   APP SHELL
   ============================================================ */
function App(){
  const store = useStore();
  const [tab,setTab]=useState("today");        // bottom-nav tab
  const [sub,setSub]=useState(null);           // sub-view within More (projects/ideas/etc)
  const [capture,setCapture]=useState(false);
  const [editor,setEditor]=useState(null);     // {kind, entity}
  const [toastObj,setToastObj]=useState(null);   // { msg, label?, fn? }
  const [typeFilter,setTypeFilter]=useState("all");
  const [locFilter,setLocFilter]=useState("all");
  const toastRef = useRef();
  const toast = useCallback((m)=>{ setToastObj({msg:m}); clearTimeout(toastRef.current); toastRef.current=setTimeout(()=>setToastObj(null),2200); },[]);
  const toastUndo = useCallback((m, fn)=>{ setToastObj({msg:m, label:"Undo", fn}); clearTimeout(toastRef.current); toastRef.current=setTimeout(()=>setToastObj(null),6000); },[]);
  // Swipe-delete routes through here so every deletion offers a few seconds to undo.
  const deleteWithUndo = useCallback((file, item)=>{
    store.remove(file, item.id);
    toastUndo("Deleted "+(item.title||item.name||"item"), ()=>store.restore(file, item));
  },[store, toastUndo]);

  const openEditor = useCallback((kind, entity)=>{ setEditor({kind, entity}); log("NAV","editor "+kind); },[]);
  const openTodo = useCallback((t)=>setEditor({kind:"todo", entity:t}),[]);
  const go = useCallback((k)=>{ setSub(k); log("NAV","go "+k); },[]);

  // --- PWA self-update: detect a newer deployed build and offer a one-tap refresh ---
  // Installed PWAs cache the HTML hard; this fetches the deployed file fresh, reads its
  // BUILD stamp, and surfaces a banner when it differs from the running build.
  const [update,setUpdate]=useState(null);   // deployed version string when it differs from BUILD
  const checkUpdate = useCallback(async (announce=false)=>{
    try{
      const res = await fetch(location.pathname + "?_=" + Date.now(), { cache:"no-store" });
      if(!res.ok){ log("UPDATE","check http "+res.status); if(announce) toast("Couldn't check for updates"); return; }
      const html = await res.text();
      const m = html.match(/const BUILD = "([^"]+)";/);
      if(m && m[1] && m[1] !== BUILD){ log("UPDATE","new build available: "+m[1]); setUpdate(m[1]); }
      else { log("UPDATE","up to date ("+BUILD+")"); if(announce) toast("You're on the latest (build "+BUILD+")"); }
    }catch(e){ log("UPDATE","check failed: "+e.message); if(announce) toast("Update check failed"); }
  },[toast]);
  useEffect(()=>{
    checkUpdate();
    const onVis = ()=>{ if(document.visibilityState==="visible") checkUpdate(); };
    document.addEventListener("visibilitychange", onVis);
    return ()=>document.removeEventListener("visibilitychange", onVis);
  },[checkUpdate]);
  // Apply by navigating to a version-stamped URL so iOS can't serve the cached HTML.
  function applyUpdate(){ log("UPDATE","applying -> "+update); window.location.replace(location.pathname + "?u=" + encodeURIComponent(update||String(Date.now()))); }

  // Apply the per-device theme (accent color + app name) live. Because this is
  // device config (not code), one shared app file can look different for each user.
  useEffect(()=>{
    const root = document.documentElement.style;
    const a = isHex6(store.cfg.accent) ? store.cfg.accent : DEFAULT_ACCENT;
    root.setProperty("--amber", a);
    root.setProperty("--amber-2", lighten(a, 0.24));
    root.setProperty("--amber-dim", a+"22");
    root.setProperty("--amber-line", a+"55");
    const th = THEMES[store.cfg.theme] || THEMES[DEFAULT_THEME];
    root.setProperty("--bg", th.bg);   root.setProperty("--bg-2", th.bg2); root.setProperty("--bg-3", th.bg3); root.setProperty("--bg-4", th.bg4);
    root.setProperty("--line", th.line); root.setProperty("--line-2", th.line2);
    root.setProperty("--ink", th.ink); root.setProperty("--ink-2", th.ink2); root.setProperty("--ink-3", th.ink3);
    const name = (store.cfg.appName||"").trim() || "Priority Captain";
    document.title = name;
    const t1 = document.querySelector('meta[name="apple-mobile-web-app-title"]'); if(t1) t1.setAttribute("content", name);
    const t2 = document.querySelector('meta[name="theme-color"]'); if(t2) t2.setAttribute("content", th.bg);
  }, [store.cfg.accent, store.cfg.appName, store.cfg.theme]);

  // --- Deep-link capture: a second Home Screen icon pointing at ...#dump boots
  // straight into the AI brain-dump surface. We route on first mount (cold launch)
  // AND on hashchange (iOS re-launching an already-open instance just swaps the hash).
  // Routing to a view that's already showing is a harmless no-op, so this is safe to
  // fire repeatedly. We deliberately do NOT clear the hash, so a manual refresh keeps you here.
  useEffect(()=>{
    function routeHash(){
      if(location.hash === "#dump"){ log("NAV","deep-link #dump -> aichat"); setSub("aichat"); }
    }
    routeHash();
    window.addEventListener("hashchange", routeHash);
    return ()=>window.removeEventListener("hashchange", routeHash);
  },[]); // eslint-disable-line

  if(!store.authReady) return <div className="app"><div className="screen"><p className="hint" style={{textAlign:"center",marginTop:90}}>Loading...</p></div></div>;
  if(store.recovery) return <div><SetPassword store={store} toast={toast}/><Toast obj={toastObj} onClose={()=>setToastObj(null)}/></div>;
  if(!store.authed) return <div><Login store={store} toast={toast}/><Toast obj={toastObj} onClose={()=>setToastObj(null)}/></div>;

  // sub-views launched from More / Today
  let subView = null;
  if(sub==="projects") subView=<ProjectsView store={store} openEditor={openEditor} onOpenTodo={openTodo} typeFilter={typeFilter} setTypeFilter={setTypeFilter} del={deleteWithUndo}/>;
  else if(sub==="ideas") subView=<IdeasView store={store} openEditor={openEditor} typeFilter={typeFilter} setTypeFilter={setTypeFilter} del={deleteWithUndo}/>;
  else if(sub==="goals") subView=<GoalsView store={store} openEditor={openEditor} typeFilter={typeFilter} setTypeFilter={setTypeFilter} del={deleteWithUndo}/>;
  else if(sub==="review") subView=<WeeklyReview store={store} back={()=>setSub(null)} go={go}/>;
  else if(sub==="now") subView=<NowView store={store} onOpen={openTodo} back={()=>setSub(null)}/>;
  else if(sub==="search") subView=<SearchView store={store} openEditor={openEditor} back={()=>setSub(null)}/>;
  else if(sub==="matrix") subView=<MatrixView store={store} onOpen={openTodo} typeFilter={typeFilter} setTypeFilter={setTypeFilter} locFilter={locFilter} setLocFilter={setLocFilter}/>;
  else if(sub==="export") subView=<ExportView store={store} toast={toast} back={()=>setSub(null)}/>;
  else if(sub==="aichat") subView=<AIChat store={store} toast={toast} back={()=>setSub(null)}/>;
  else if(sub==="settings") subView=<SettingsView store={store} toast={toast} toastUndo={toastUndo} go={go} onCheckUpdate={checkUpdate} build={BUILD}/>;
  else if(sub==="diagnostics") subView=<Diagnostics back={()=>setSub("settings")}/>;

  let main;
  if(sub && sub!=="more") main=subView;
  else if(tab==="today") main=<TodayView store={store} onOpen={openTodo} goNow={()=>setSub("now")} typeFilter={typeFilter} del={deleteWithUndo}/>;
  else if(tab==="lists") main=<ListsView store={store} onOpen={openTodo} typeFilter={typeFilter} setTypeFilter={setTypeFilter} locFilter={locFilter} setLocFilter={setLocFilter} del={deleteWithUndo}/>;
  else if(tab==="more") main=<MoreView store={store} go={go}/>;

  function navTo(t){ setTab(t); setSub(null); }
  // Promote Ideas/Goals/Search to nav items: clear the main tab so only the sub lights up.
  function goNav(s){ setTab(""); setSub(s); }
  const NAV_SUBS = ["ideas","projects","search"]; // not "owned" by the More tab highlight
  const moreActive = tab==="more" || (sub && !NAV_SUBS.includes(sub));

  const syncLabel = store.sync==="idle"?"Synced":store.sync==="busy"?(store.syncMsg||"Working"):store.sync==="pending"?"Queued offline":store.syncMsg||"Sync error";

  return (
    <div className="app">
      {update &&
        <button className="update-bar" onClick={applyUpdate}>
          <span>{Ic.sparkle} Update available - tap to refresh <b>(build {update})</b></span>
          <span className="update-go">Refresh</span>
        </button>}
      {/* global top bar - search on every page (hidden on the search view itself) + sync */}
      {sub!=="search" &&
        <div style={{padding:"calc(env(safe-area-inset-top) + 10px) 18px 0"}}>
          <button className="search-bar" style={{marginTop:0}} onClick={()=>setSub("search")}>{Ic.search}<span>Search everything</span></button>
          {sub!=="settings" && store.sync!=="idle" &&
            <div className={"sync "+store.sync} style={{marginTop:10}}><span className="dot"></span>{syncLabel}</div>}
        </div>}
      {main}

      {/* bottom nav - 5 items + center capture FAB */}
      <div className="nav">
        <button className={"nav-btn"+(tab==="today"&&!sub?" on":"")} onClick={()=>navTo("today")}><NavIc d={Ic.today}/>Today</button>
        <button className={"nav-btn"+(tab==="lists"&&!sub?" on":"")} onClick={()=>navTo("lists")}><NavIc d={Ic.lists}/>To-Dos</button>
        <button className={"nav-btn"+(sub==="ideas"?" on":"")} onClick={()=>goNav("ideas")}><NavIc d={Ic.idea}/>Ideas</button>
        <button className="nav-btn nav-fab" onClick={()=>setCapture(true)}><span className="fab">{Ic.plus}</span></button>
        <button className={"nav-btn"+(sub==="projects"?" on":"")} onClick={()=>goNav("projects")}><NavIc d={Ic.project}/>Projects</button>
        <button className={"nav-btn"+(moreActive?" on":"")} onClick={()=>navTo("more")}><NavIc d={Ic.more}/>More</button>
      </div>

      {/* capture sheet */}
      {capture && <CaptureSheet store={store} toast={toast} onClose={()=>setCapture(false)} openEditor={openEditor} openAI={()=>{ setCapture(false); setSub("aichat"); }}/>}

      {/* editors */}
      {editor && editor.kind==="todo" && <TodoEditor store={store} todo={editor.entity} toast={toast} onClose={()=>setEditor(null)}/>}
      {editor && editor.kind==="idea" && <IdeaEditor store={store} idea={editor.entity} toast={toast} onClose={()=>setEditor(null)}/>}
      {editor && editor.kind==="project" && <ProjectEditor store={store} project={editor.entity} toast={toast} onClose={()=>setEditor(null)}/>}
      {editor && editor.kind==="goal" && <GoalEditor store={store} goal={editor.entity} toast={toast} onClose={()=>setEditor(null)}/>}

      <Toast obj={toastObj} onClose={()=>setToastObj(null)}/>
    </div>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
(function(){
  try{
    log("INIT","mounting app");
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
    log("INIT","mounted");
  }catch(e){
    log("ERROR","mount failed: "+e.message);
    document.getElementById("root").innerHTML =
      '<div style="padding:40px;color:#f3ead9;font-family:sans-serif"><h2>Startup error</h2><p>'+e.message+'</p></div>';
  }
})();
</script>
</body>
</html>
