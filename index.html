/* ============================================================
   SMALL SHARED COMPONENTS
   ============================================================ */
function Sheet({ title, onClose, children, action }){
  useEffect(() => { document.body.style.overflow="hidden"; return () => { document.body.style.overflow=""; }; }, []);
  // Portal to <body>. The scrim + sheet are position:fixed (viewport-anchored), but a
  // Sheet opened from inside a row (e.g. the snooze button) sits under SwipeRow's
  // .swipe-body, which has transform + will-change:transform - that makes it the
  // containing block for fixed descendants, so the sheet would anchor to the ROW and
  // get clipped by .swipe-wrap's overflow:hidden. The portal lifts it out of that.
  return ReactDOM.createPortal(
    <div>
      <div className="scrim" onClick={onClose}></div>
      <div className="sheet" role="dialog">
        <div className="sheet-grip"></div>
        <div className="sheet-head">
          {title && <h3 className="sheet-title">{title}</h3>}
          <div style={{display:"flex",alignItems:"center",gap:10,flex:"0 0 auto"}}>
            {action}
            <button className="sheet-x" onClick={onClose} aria-label="Cancel">{Ic.close}</button>
          </div>
        </div>
        {children}
      </div>
    </div>,
    document.body
  );
}
function Toast({ obj, onClose }){
  if(!obj) return null;
  return <div className={"toast"+(obj.fn?" toast-bar":"")}>
    <span>{obj.msg}</span>
    {obj.fn && <button className="toast-act" onClick={()=>{ obj.fn(); onClose && onClose(); }}>{obj.label||"Undo"}</button>}
  </div>;
}
function Empty({ glyph, title, sub }){
  return <div className="empty"><div className="glyph">{glyph||"\u2727"}</div><b style={{color:"var(--ink-2)",fontFamily:"Fraunces",fontSize:18}}>{title}</b><p>{sub}</p></div>;
}
function Check({ on, onClick }){
  return <button className={"check"+(on?" on":"")} onClick={onClick} aria-label="toggle">{Ic.check}</button>;
}
function TypeChip({ type }){
  if(!type) return null;                       // uncategorized items show no chip
  const h = catHue(type);
  return <span className="chip" style={{background:h+"22", color:h, border:"1px solid "+h+"55"}}>{type}</span>;
}

// Confirm dialog (destructive actions need a deliberate second tap, no traps)
function Confirm({ text, confirmLabel, onConfirm, onCancel }){
  return (
    <Sheet title="Are you sure?" onClose={onCancel}>
      <p className="hint" style={{fontSize:14,marginBottom:16}}>{text}</p>
      <button className="btn btn-danger btn-block" onClick={onConfirm}>{confirmLabel||"Delete"}</button>
      <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={onCancel}>Cancel</button>
    </Sheet>
  );
}

/* ============================================================
   CONVERT an item between entity types (todo/idea/project/goal).
   Destructive replace: creates the new entity, removes the old.
   ============================================================ */
const TYPE_FILE = { todo:"todos", idea:"ideas", project:"projects", goal:"goals" };
const FILE_NOUN = { todos:"todo", ideas:"idea", projects:"project", goals:"goal" };
function convertEntity(store, fromFile, item, toType, toast, onClose){
  // Pull common fields regardless of source shape (todos/ideas use title; projects/goals use name).
  const title = item.title || item.name || "";
  const body  = item.notes || item.body || item.description || item.outcome || item.why || "";
  const type  = item.type || "";
  const date  = item.due || item.deadline || item.target || "";
  const tags  = item.tags || [];
  let row;
  if(toType==="todo")         row = { title, notes:body, type, status:"inbox", due:date, tags, subtasks:[] };
  else if(toType==="idea")    row = { title, body, type, state:"raw", capturedAt:nowISO(), tags };
  else if(toType==="project") row = { name:title, type, status:"active", outcome:"", description:body, deadline:date, goalId:null };
  else if(toType==="goal")    row = { name:title, type, why:body, status:"active", target:date };
  store.upsert(TYPE_FILE[toType], row);
  store.remove(fromFile, item.id);
  log("SAVE","convert "+fromFile+" -> "+toType);
  toast("Converted to "+toType); onClose();
}
function ConvertRow({ store, fromFile, item, toast, onClose }){
  const [confirm,setConfirm]=useState(null);
  const opts = [["todo","Todo","todos"],["idea","Idea","ideas"],["project","Project","projects"],["goal","Goal","goals"]]
    .filter(o=>o[2]!==fromFile);
  return (
    <div style={{marginTop:16}}>
      <span className="label">Convert this into</span>
      <div className="pills">
        {opts.map(([t,l])=><button key={t} className="pill" onClick={()=>setConfirm(t)}>{l}</button>)}
      </div>
      {confirm && <Confirm
        text={"Convert this "+FILE_NOUN[fromFile]+" into a "+confirm+"? The original will be replaced, and fields that don't carry over are dropped."}
        confirmLabel={"Convert to "+confirm}
        onConfirm={()=>convertEntity(store, fromFile, item, confirm, toast, onClose)}
        onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

// The Space an editor should preselect: the item's own, else the active Space (or, in
// "All", the default). New items thus inherit the current focus, with the picker to override.
function editorSpace(store, t){
  return (t && t.space) || (store.activeSpace && store.activeSpace!=="all" ? store.activeSpace : (store.defaultSpace||DEFAULT_SPACE));
}
// Reusable Space picker for the item editors (the "easy override control").
function SpaceField({ store, value, onChange }){
  const list = (store.spaces||[]).filter(s=>!s.archived).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  if(!list.length) return null;   // spaces not seeded yet
  return (
    <div className="field"><span className="label">Space</span>
      <select className="select" value={value||""} onChange={e=>onChange(e.target.value)}>
        {list.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
      </select>
    </div>
  );
}

function TodoEditor({ store, todo, onClose, toast }){
  const t = todo || {};
  const [space,setSpace]=useState(editorSpace(store, t));
  const [title,setTitle]=useState(t.title||"");
  const [status,setStatus]=useState(t.status||"inbox");
  const [type,setType]=useState(t.type||"");
  const [quad,setQuad]=useState(t.quad||"");
  const [due,setDue]=useState(t.due||"");
  const [defer,setDefer]=useState(t.defer||"");
  const [recur,setRecur]=useState(t.recur||"none");
  const [tags,setTags]=useState((t.tags||[]).join(", "));
  const [projectId,setProjectId]=useState(t.projectId||"");
  const [url,setUrl]=useState(t.url||"");
  const [notes,setNotes]=useState(t.notes||"");
  const [waitingOn,setWaitingOn]=useState(t.waitingOn||"");
  const [subtasks,setSubtasks]=useState(t.subtasks||[]);
  const [newSub,setNewSub]=useState("");
  const locs = knownLocations(store);
  const [location,setLocation]=useState(t.location||"");
  const [locCustom,setLocCustom]=useState(!!t.location && !locs.includes(t.location));
  const [newProj,setNewProj]=useState("");      // inline "create new project" name
  const projects = store.data.projects.filter(p=>p.status!=="archived");

  function save(){
    if(!title.trim()){ toast("Add a title first"); return; }
    // If the user chose "create new project", make it first and link to its id.
    let finalProjectId = projectId;
    if(projectId==="__new"){
      if(newProj.trim()){
        const p = store.upsert("projects",{ name:newProj.trim(), type, status:"active", outcome:"", description:"", deadline:"", goalId:null });
        finalProjectId = p.id;
        log("SAVE","todo created project "+newProj.trim());
      } else {
        finalProjectId = "";   // chose "new" but typed nothing -> leave unlinked
      }
    }
    // A recurring todo needs an anchor; if none given, start it today.
    const dueAnchored = (recur!=="none" && !due) ? TODAY() : due;
    store.upsert("todos",{ id:t.id, title:title.trim(), status, type, quad, due:dueAnchored, defer, recur, space,
      tags: tags.split(",").map(s=>s.trim()).filter(Boolean), projectId:finalProjectId, url:url.trim(), notes, location,
      waitingOn: status==="waiting"?waitingOn:"", subtasks,
      starredToday: t.starredToday||false, completedAt: t.completedAt||null });
    toast(t.id?"Saved":"Added"); onClose();
  }
  function addSub(){ if(!newSub.trim())return; setSubtasks([...subtasks,{id:uid(),title:newSub.trim(),done:false}]); setNewSub(""); }

  return (
    <Sheet title={t.id?"Edit todo":"New todo"} onClose={onClose} action={<button className="btn btn-primary btn-sm" onClick={save}>{t.id?"Save":"Add"}</button>}>
      <div className="title-field"><span className="label">Title</span>
        <input className="title-input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="What needs doing?" autoFocus/></div>
      <div className="row">
        <div className="field"><span className="label">Status</span>
          <select className="select" value={status} onChange={e=>setStatus(e.target.value)}>
            {STATUS_ORDER.map(s=><option key={s} value={s}>{s[0].toUpperCase()+s.slice(1)}</option>)}
          </select></div>
        <div className="field"><span className="label">Category</span>
          <select className="select" value={type} onChange={e=>setType(e.target.value)}>
            <option value="">Uncategorized</option>{knownCategories(store).map(c=><option key={c} value={c}>{c}</option>)}</select></div>
      </div>
      <SpaceField store={store} value={space} onChange={setSpace}/>
      {status==="waiting" &&
        <div className="field"><span className="label">Waiting on</span>
          <input className="input" value={waitingOn} onChange={e=>setWaitingOn(e.target.value)} placeholder="Who / what?"/></div>}
      <div className="field"><span className="label">Priority (Eisenhower)</span>
        <select className="select" value={quad} onChange={e=>setQuad(e.target.value)}>
          <option value="">None</option>
          {Object.entries(QUADRANTS).map(([k,v])=><option key={k} value={k}>{v.label} - {v.hint}</option>)}
        </select></div>
      <div className="row">
        <div className="field"><span className="label">Due</span>
          <input className="input" type="date" value={due} onChange={e=>setDue(e.target.value)}/></div>
        <div className="field"><span className="label">Defer until</span>
          <input className="input" type="date" value={defer} onChange={e=>setDefer(e.target.value)}/></div>
      </div>
      <div className="field"><span className="label">Repeat</span>
        <select className="select" value={recur} onChange={e=>setRecur(e.target.value)}>
          <option value="none">Does not repeat</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        {recur!=="none" && <p className="hint">Starts on the due date{!due?" (today, since none set)":""}. Completing it creates the next one automatically.</p>}</div>
      <div className="field"><span className="label">Project (optional)</span>
        <select className="select" value={projectId} onChange={e=>setProjectId(e.target.value)}>
          <option value="">None</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          <option value="__new">+ Create new project...</option>
        </select>
        {projectId==="__new" &&
          <input className="input" style={{marginTop:8}} value={newProj} onChange={e=>setNewProj(e.target.value)}
            placeholder="New project name (created on save)" autoCapitalize="sentences"/>}
      </div>
      <div className="field"><span className="label">Location / context</span>
        <select className="select" value={locCustom?"__custom":location}
          onChange={e=>{ if(e.target.value==="__custom"){ setLocCustom(true); setLocation(""); } else { setLocCustom(false); setLocation(e.target.value); } }}>
          <option value="">Any place</option>
          {locs.map(l=><option key={l} value={l}>{l}</option>)}
          <option value="__custom">Other (type a place)</option>
        </select>
        {locCustom &&
          <input className="input" style={{marginTop:8}} value={location} onChange={e=>setLocation(e.target.value)}
            placeholder="e.g. Hardware store" autoCapitalize="words"/>}
        <p className="hint">"Any place" shows up no matter where you filter. Manage your saved places in Settings.</p></div>
      <div className="field"><span className="label">Tags (comma separated)</span>
        <input className="input" value={tags} onChange={e=>setTags(e.target.value)} placeholder="errand, finance"/></div>
      <div className="field"><span className="label">Link (optional)</span>
        <input className="input" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://"/></div>
      <div className="field"><span className="label">Subtasks</span>
        <div className="subtasks">
          {subtasks.map(s=>
            <div key={s.id} className={"subtask"+(s.done?" done":"")}>
              <button className={"mini"+(s.done?" on":"")} onClick={()=>setSubtasks(subtasks.map(x=>x.id===s.id?{...x,done:!x.done}:x))}></button>
              <span style={{flex:1}}>{s.title}</span>
              <button onClick={()=>setSubtasks(subtasks.filter(x=>x.id!==s.id))} style={{color:"var(--ink-3)",fontSize:18}}>&times;</button>
            </div>)}
        </div>
        <div className="row" style={{marginTop:8}}>
          <input className="input" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="Add subtask"
            onKeyDown={e=>e.key==="Enter"&&addSub()} style={{flex:3}}/>
          <button className="btn btn-ghost btn-sm" onClick={addSub} style={{flex:1}}>Add</button>
        </div>
      </div>
      <div className="field"><span className="label">Notes</span>
        <textarea className="textarea" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Details, context..."/></div>
      <button className="btn btn-primary btn-block" onClick={save}>{t.id?"Save changes":"Add todo"}</button>
      {t.id && <ConvertRow store={store} fromFile="todos" item={t} toast={toast} onClose={onClose}/>}
      {t.id && <button className="btn btn-danger btn-block" style={{marginTop:10}}
        onClick={()=>{ store.remove("todos",t.id); toast("Deleted"); onClose(); }}>Delete</button>}
    </Sheet>
  );
}

function IdeaEditor({ store, idea, onClose, toast }){
  const t = idea || {};
  const [space,setSpace]=useState(editorSpace(store, t));
  const [title,setTitle]=useState(t.title||"");
  const [body,setBody]=useState(t.body||"");
  const [type,setType]=useState(t.type||"");
  const [tags,setTags]=useState((t.tags||[]).join(", "));
  const [state,setState]=useState(t.state||"raw");
  function save(){
    if(!title.trim()){ toast("Add a title first"); return; }
    store.upsert("ideas",{ id:t.id, title:title.trim(), body, type, state, space,
      tags: tags.split(",").map(s=>s.trim()).filter(Boolean),
      capturedAt: t.capturedAt||nowISO(), promotedProjectId: t.promotedProjectId||null });
    toast(t.id?"Saved":"Captured"); onClose();
  }
  function promote(){
    // Idea -> Project: carry title + body + space, mark idea promoted (E1/C2 decision)
    const p = store.upsert("projects",{ name:title.trim(), type, status:"active", space,
      outcome:"", description: body, deadline:"", goalId:null });
    store.upsert("ideas",{ id:t.id, title:title.trim(), body, type, space, tags:tags.split(",").map(s=>s.trim()).filter(Boolean),
      state:"promoted", capturedAt:t.capturedAt||nowISO(), promotedProjectId:p.id });
    toast("Promoted to project"); onClose();
  }
  return (
    <Sheet title={t.id?"Edit idea":"New idea"} onClose={onClose} action={<button className="btn btn-primary btn-sm" onClick={save}>{t.id?"Save":"Capture"}</button>}>
      <div className="title-field"><span className="label">Idea</span>
        <input className="title-input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="A raw thought..." autoFocus/></div>
      <div className="field"><span className="label">Body</span>
        <textarea className="textarea" value={body} onChange={e=>setBody(e.target.value)} placeholder="Flesh it out, or leave it to sit."/></div>
      <div className="row">
        <div className="field"><span className="label">Category</span>
          <select className="select" value={type} onChange={e=>setType(e.target.value)}>
            <option value="">Uncategorized</option>{knownCategories(store).map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        <div className="field"><span className="label">State</span>
          <select className="select" value={state} onChange={e=>setState(e.target.value)}>
            <option value="raw">Raw</option><option value="developing">Developing</option>
            <option value="promoted">Promoted</option><option value="discarded">Discarded</option></select></div>
      </div>
      <SpaceField store={store} value={space} onChange={setSpace}/>
      <div className="field"><span className="label">Tags</span>
        <input className="input" value={tags} onChange={e=>setTags(e.target.value)} placeholder="comma, separated"/></div>
      <button className="btn btn-primary btn-block" onClick={save}>{t.id?"Save":"Capture idea"}</button>
      {t.id && t.state!=="promoted" &&
        <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={promote}>Promote to project</button>}
      {t.id && <ConvertRow store={store} fromFile="ideas" item={t} toast={toast} onClose={onClose}/>}
      {t.id && <button className="btn btn-danger btn-block" style={{marginTop:10}}
        onClick={()=>{ store.remove("ideas",t.id); toast("Deleted"); onClose(); }}>Delete</button>}
    </Sheet>
  );
}

/* Swipe a row left to reveal a Delete action. Horizontal-only, so vertical scroll and
   the reorder handle are unaffected; a swipe suppresses the row's open-on-tap. */
function SwipeRow({ onDelete, children }){
  const [dx,setDx] = useState(0);
  const st = useRef(null); const moved = useRef(false);
  function down(e){ st.current = { x:e.clientX, y:e.clientY, base:dx }; moved.current = false; try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} }
  function move(e){
    if(!st.current) return;
    const ddx = e.clientX - st.current.x, ddy = e.clientY - st.current.y;
    if(Math.abs(ddx) > 8 && Math.abs(ddx) > Math.abs(ddy)) moved.current = true;
    if(moved.current){ setDx(Math.max(-96, Math.min(0, st.current.base + ddx))); }
  }
  function end(){ if(!st.current) return; st.current = null; setDx(d => { const nd = d <= -48 ? -84 : 0; if(nd===0) moved.current = false; return nd; }); }
  function clickCapture(e){ if(moved.current || dx !== 0){ e.stopPropagation(); e.preventDefault(); moved.current = false; setDx(0); } }
  return (
    <div className="swipe-wrap">
      <button className="swipe-del" onClick={(e)=>{ e.stopPropagation(); setDx(0); onDelete(); }}>{Ic.trash}<span>Delete</span></button>
      <div className="swipe-body" style={{ transform:`translateX(${dx}px)`, transition: st.current ? "none" : "transform .18s" }}
        onPointerDown={down} onPointerMove={move} onPointerUp={end} onPointerCancel={end} onClickCapture={clickCapture}>
        {children}
      </div>
    </div>
  );
}

/* ============================================================
   DRAG-TO-REORDER list. Handle-based (grip), pointer events for touch+mouse.
   Persists one moved item via onReorder(movedId, newIdsInOrder).
   ============================================================ */
function DragList({ items, getId, onReorder, onDelete, render, reorderable=true }){
  const [order,setOrder] = useState(items);
  const dragId = useRef(null);
  const cont = useRef(null);
  // resync from source unless mid-drag
  useEffect(() => { if(dragId.current==null) setOrder(items); }, [items]);
  function down(e, id){ dragId.current = id; try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} setOrder(items.slice()); }
  function move(e){
    if(dragId.current==null || !cont.current) return;
    const rows = [...cont.current.querySelectorAll("[data-drag-row]")];
    const y = e.clientY;
    let target = rows.findIndex(r => { const b=r.getBoundingClientRect(); return y < b.top + b.height/2; });
    if(target===-1) target = order.length-1;
    const from = order.findIndex(x => getId(x)===dragId.current);
    if(from<0 || target<0 || from===target) return;
    const next = order.slice(); const [m] = next.splice(from,1); next.splice(target,0,m); setOrder(next);
  }
  function up(){
    if(dragId.current==null) return;
    const moved = dragId.current; dragId.current = null;
    const newIds = order.map(getId), oldIds = items.map(getId);
    if(newIds.join("|") !== oldIds.join("|")) onReorder(moved, newIds);  // skip stray taps
  }
  return (
    <div className="list" ref={cont} onPointerMove={move} onPointerUp={up} onPointerCancel={up}>
      {order.map(it => (
        <div className={"drag-row"+(dragId.current===getId(it)?" dragging":"")} data-drag-row key={getId(it)}>
          {reorderable && <button className="drag-handle" aria-label="Drag to reorder" onPointerDown={e=>down(e, getId(it))}>{Ic.grip}</button>}
          <div className="drag-row-body">{onDelete ? <SwipeRow onDelete={()=>onDelete(it)}>{render(it)}</SwipeRow> : render(it)}</div>
        </div>
      ))}
    </div>
  );
}

/* Shared "show completed to-dos" preference, used everywhere to-dos are listed
   (the To-Dos view and inside a project) so behavior is consistent. The value is
   persisted to localStorage, so the choice sticks between sessions and across both
   surfaces. Each view keeps its own React state but reads/writes the same key; the
   two views are never on screen at once, so this stays in sync without extra wiring. */
function useShowDone(){
  const [showDone,setShowDone]=useState(()=>lsGet("showDone",false));
  useEffect(()=>{ lsSet("showDone", showDone); },[showDone]);  // persist on every change

// Apply a snooze to one todo: hide until `targetISO`, and push a due-today/overdue item's
// due forward so it returns clean. Shared by the single-row and bulk snooze flows.
function snoozeTodo(store, todo, targetISO){
  const datePart = targetISO.slice(0,10);
  const patch = { id: todo.id, defer: targetISO, starredToday:false };
  if(!todo.due || todo.due <= datePart) patch.due = datePart;
  store.upsert("todos", patch);
  log("SAVE","snooze "+todo.id+" -> "+targetISO);
}

function TodoRow({ store, todo, onOpen }){
  const done = todo.status==="done";
  const [snz,setSnz]=useState(false);
  const project = store.data.projects.find(p=>p.id===todo.projectId);
  const subDone = (todo.subtasks||[]).filter(s=>s.done).length;
  const dwait = todo.status==="waiting" ? waitingDays(todo) : null;            // days waiting (null if not waiting)
  const waitStale = dwait!=null && dwait >= waitThreshold(store);              // past the follow-up threshold
  function toggle(){
    if(!done){ store.completeTodo(todo); }       // completing: spawns next if recurring
    else { store.upsert("todos",{ id:todo.id, status:"next", completedAt:null }); } // un-completing: no spawn
  }
  return (
    <div className={"item"+(done?" done":"")}>
      <Check on={done} onClick={toggle}/>
      <div className="item-body" onClick={onOpen}>
        <div className="item-title">{todo.title}</div>
        <div className="item-meta">
          <TypeChip type={todo.type}/>
          {todo.starredToday && <span className="chip amber">{Ic.star}</span>}
          {todo.status!=="done" && todo.status!=="next" && todo.status!=="waiting" && <span className="chip">{todo.status}</span>}
          {todo.status==="waiting" && <span className={"chip "+(waitStale?"red":"")}>{Ic.clock} Waiting{dwait!=null?" "+dwait+"d":""}</span>}
          {todo.quad && <span className="chip amber">{QUADRANTS[todo.quad].label}</span>}
          {todo.due && <span className={"chip "+(isOverdue(todo.due)?"red":isToday(todo.due)?"amber":"")}>{isOverdue(todo.due)?"Overdue ":""}{fmtDate(todo.due)}</span>}
          {isDeferredAway(todo) && <span className="chip blue">{Ic.clock} {fmtDefer(todo.defer)}</span>}
          {todo.waitingOn && <span className="chip blue">waiting: {todo.waitingOn}</span>}
          {todo.location && <span className="chip green">{todo.location}</span>}
          {project && <span className="chip">{project.name}</span>}
          {todo.recur && todo.recur!=="none" && <span className="chip violet">{Ic.review} {todo.recur}</span>}
          {(todo.subtasks||[]).length>0 && <span className="chip">{subDone}/{todo.subtasks.length}</span>}
          {(todo.tags||[]).map(t=><span key={t} className="chip">#{t}</span>)}
        </div>
      </div>
      {!done && <button aria-label="Snooze" onClick={(e)=>{ e.stopPropagation(); setSnz(true); }}
        style={{flex:"0 0 auto",alignSelf:"center",background:"none",border:"none",color:"var(--ink-3)",padding:"6px 8px",cursor:"pointer"}}>
        <span style={{width:18,height:18,display:"inline-flex"}}>{Ic.clock}</span></button>}
      {snz && <SnoozeSheet onPick={(iso)=>snoozeTodo(store, todo, iso)} onClose={()=>setSnz(false)}/>}
    </div>
  );
}

/* ============================================================
   CAPTURE - action sheet + quick add + AI flows
   ============================================================ */
function CaptureSheet({ store, onClose, toast, openEditor, openAI }){
  // Resume an unsaved review draft if one was left behind (survives close + reload).
  const initialPending = lsGet("pendingReview", []) || [];
  const [mode,setMode]=useState(initialPending.length ? "review" : "menu"); // menu | quick | brain | photo | review | template
  const [quick,setQuick]=useState("");
  const [tplName,setTplName]=useState("");   // optional project name when creating from a template
  const [busy,setBusy]=useState(false);
  const [brain,setBrain]=useState("");
  const [results,setResults]=useState(initialPending); // AI extracted items pending review
  const [err,setErr]=useState("");
  const fileRef = useRef(null);

  // WHY: persist the in-progress review so an accidental dismiss never throws away
  // AI work the user already paid an API call for. Cleared only on save or discard.
  useEffect(() => {
    if(results.length) lsSet("pendingReview", results); else lsDel("pendingReview");
  }, [results]);

  function quickAdd(){
    if(!quick.trim())return;
    store.upsert("todos",{ title:quick.trim(), status:"inbox", type:"", tags:[], subtasks:[] });
    toast("Added to Inbox"); setQuick("");
    log("NAV","quick-add to inbox");
  }
  async function runBrain(){
    if(!brain.trim())return;
    setBusy(true); setErr("");
    try{
      const items = await claudeExtract([{type:"text",text:"Turn this into tracker items:\n\n"+brain}]);
      setResults(items.map(x=>({ ...x, keep:true }))); setMode("review");
    }catch(e){ setErr(e.message); } finally{ setBusy(false); }
  }
  async function runPhoto(file){
    if(!file)return;
    setBusy(true); setErr(""); setMode("photo");
    try{
      const b64 = await resizeImage(file);
      const items = await claudeExtract([
        { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:b64 } },
        { type:"text", text:"Extract every task/idea written or shown in this image as tracker items." }
      ]);
      setResults(items.map(x=>({ ...x, keep:true }))); setMode("review");
    }catch(e){ setErr(e.message); setMode("photo"); } finally{ setBusy(false); }
  }
  function saveReview(){
    const keep = results.filter(r=>r.keep);
    const byFile = { todos:[], ideas:[], projects:[] };
    keep.forEach(r=>{
      if(r.type==="idea") byFile.ideas.push({ title:r.title, body:r.note||"", type:"", tags:[], state:"raw", capturedAt:nowISO() });
      else if(r.type==="project") byFile.projects.push({ name:r.title, type:"", status:"active", outcome:"", description:r.note||"", deadline:"", goalId:null });
      else byFile.todos.push({ title:r.title, status:r.suggestedStatus||"inbox", type:"", tags:[], notes:r.note||"", subtasks:[] });
    });
    Object.entries(byFile).forEach(([f,rows])=>{ if(rows.length) store.bulkAdd(f,rows); });
    lsDel("pendingReview");                  // explicit: unmount may pre-empt the effect
    setResults([]);
    toast("Added "+keep.length+" item"+(keep.length===1?"":"s")); onClose();
  }
  function discardDraft(){
    lsDel("pendingReview"); setResults([]); setMode("menu");
    toast("Draft discarded");
  }

  if(mode==="menu") return (
    <Sheet title="Capture" onClose={onClose}>
      {results.length>0 &&
        <button className="card" style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",
          borderColor:"var(--amber-line)",background:"var(--amber-dim)",marginTop:6,marginBottom:4}}
          onClick={()=>setMode("review")}>
          <span className="act-ic">{Ic.bolt}</span>
          <span className="act-txt"><b>Resume your review</b><span>{results.length} item{results.length===1?"":"s"} waiting - nothing saved yet</span></span>
        </button>}
      <div className="field" style={{marginTop:6}}>
        <span className="label" style={{color:"var(--amber)"}}>Brain-dump to AI</span>
        <textarea className="textarea" value={brain} onChange={e=>setBrain(e.target.value)} style={{minHeight:92}}
          placeholder="Talk or type everything on your mind - I'll turn it into todos, projects, and ideas, and help file your inbox..."/>
        <button className="btn btn-primary btn-block" style={{marginTop:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
          onClick={()=>{ const t=brain.trim(); if(t) lsSet("aiSeed", t); openAI(); }}>
          <span style={{width:18,height:18,display:"inline-flex"}}>{Ic.sparkle}</span> Organize with AI</button>
      </div>
      <div className="divider"></div>
      <div className="field">
        <div className="row">
          <input className="input" value={quick} onChange={e=>setQuick(e.target.value)} placeholder="Or quick-add one to Inbox..."
            onKeyDown={e=>e.key==="Enter"&&quickAdd()} style={{flex:3}}/>
          <button className="btn btn-primary btn-sm" onClick={quickAdd} style={{flex:1}}>Add</button>
        </div>
        <p className="hint">Type or dictate a single item. Triage from the Inbox later.</p>
      </div>
      <div className="divider"></div>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("todo"); }}>
        <span className="act-ic">{Ic.todo}</span><span className="act-txt"><b>New todo</b><span>Full form, all fields</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("idea"); }}>
        <span className="act-ic">{Ic.idea}</span><span className="act-txt"><b>New idea</b><span>A thought to sit on</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("project"); }}>
        <span className="act-ic">{Ic.project}</span><span className="act-txt"><b>New project</b><span>An outcome with many steps</span></span></button>
      <button className="act-row" onClick={()=>{ setTplName(""); setMode("template"); }}>
        <span className="act-ic">{Ic.lists}</span><span className="act-txt"><b>New from template</b><span>Reuse a saved checklist (e.g. packing)</span></span></button>
      <button className="act-row" onClick={()=>{ onClose(); openEditor("goal"); }}>
        <span className="act-ic">{Ic.goal}</span><span className="act-txt"><b>New goal</b><span>Longer-term objective</span></span></button>
      <div className="divider"></div>
      <button className="act-row" onClick={()=>fileRef.current && fileRef.current.click()}>
        <span className="act-ic">{Ic.camera}</span><span className="act-txt"><b>Photo / scan</b><span>Read tasks from a picture</span></span></button>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={e=>{ const f=e.target.files[0]; e.target.value=""; runPhoto(f); }}/>
    </Sheet>
  );

  if(mode==="template") return (
    <Sheet title="New from template" onClose={onClose}>
      {(store.templates||[]).length===0
        ? <><p className="hint">No templates yet. Open a project and tap <b>Save as template</b> to make a reusable checklist - like a packing list you reuse each trip.</p>
            <button className="btn btn-ghost btn-block" style={{marginTop:12}} onClick={()=>setMode("menu")}>Back</button></>
        : <>
            <div className="field"><span className="label">Project name (optional)</span>
              <input className="input" value={tplName} onChange={e=>setTplName(e.target.value)} placeholder="Defaults to the template name - e.g. Trip: Kansas City"/></div>
            <div className="divider"></div>

      <p className="hint" style={{marginBottom:12}}>Nothing saves until you confirm. Tap to toggle, edit titles inline.</p>
      {results.map((r,i)=>
        <div key={i} className={"rev-item"+(r.keep?"":" skip")}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <Check on={r.keep} onClick={()=>setResults(results.map((x,j)=>j===i?{...x,keep:!x.keep}:x))}/>
            <input className="input" value={r.title} style={{flex:1}}
              onChange={e=>setResults(results.map((x,j)=>j===i?{...x,title:e.target.value}:x))}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:8,paddingLeft:32}}>
            <select className="select" value={r.type} style={{flex:1}}
              onChange={e=>setResults(results.map((x,j)=>j===i?{...x,type:e.target.value}:x))}>
              <option value="todo">Todo</option><option value="idea">Idea</option><option value="project">Project</option></select>
          </div>
        </div>)}
      <button className="btn btn-primary btn-block" style={{marginTop:6}} onClick={saveReview}>Add kept items</button>
      <button className="btn btn-ghost btn-block" style={{marginTop:10}} onClick={()=>setMode("menu")}>Keep for later</button>
      <button className="btn btn-danger btn-block" style={{marginTop:10}} onClick={discardDraft}>Discard these</button>
      <p className="hint center" style={{marginTop:10}}>"Keep for later" saves this as a draft you can resume from the + menu.</p>
    </Sheet>
  );
  return null;
}

/* ============================================================
   FILTER HELPERS
   ============================================================ */
// An item deferred to a future date is hidden everywhere until then.
const isDeferredAway = (t) => { if(!t.defer) return false; return (t.defer.length>10) ? (t.defer > snzNow()) : (t.defer > TODAY()); };
// Quadrant sort weight (Do First highest)
const quadWeight = (q) => ({q1:0,q3:1,q2:2,q4:3,"":4})[q||""];

function todayItems(todos){
  return todos.filter(t => t.status!=="done" && t.status!=="someday" && !isDeferredAway(t) &&
    ( isToday(t.due) || isOverdue(t.due) || t.starredToday || (t.defer && t.defer===TODAY()) ));
}
function sortTodos(a,b){
  const q = quadWeight(a.quad)-quadWeight(b.quad); if(q) return q;
  if(a.due && b.due) return a.due<b.due?-1:1; if(a.due) return -1; if(b.due) return 1;
  return 0;
}
// Natural (pre-manual) sorts, used once to seed each item's manual `order`.
function sortIdeas(a,b){ return (b.capturedAt||"").localeCompare(a.capturedAt||""); }
const PROJ_STATUS_ORDER = { active:0, onhold:1, someday:2, done:3, archived:4 };
function sortProjects(a,b){ return (PROJ_STATUS_ORDER[a.status]||0)-(PROJ_STATUS_ORDER[b.status]||0); }
function sortGoals(a,b){ return 0; }  // keep existing array order
const NAT_CMP = { todos:sortTodos, ideas:sortIdeas, projects:sortProjects, goals:sortGoals };
// Manual order: what drag-to-reorder controls. All items get a numeric `order` (seeded once).
function byOrder(a,b){ return (a.order==null?0:a.order)-(b.order==null?0:b.order); }
// Persist a single moved item's new position as the midpoint between its new neighbors.
function reorderItem(store, file, movedId, idsInOrder, items){
  const byId = {}; items.forEach(x=>{ byId[x.id]=x; });
  const idx = idsInOrder.indexOf(movedId);
  if(idx<0) return;
  const prev = idx>0 ? byId[idsInOrder[idx-1]] : null;
  const next = idx<idsInOrder.length-1 ? byId[idsInOrder[idx+1]] : null;
  const po = prev && typeof prev.order==="number" ? prev.order : null;
  const no = next && typeof next.order==="number" ? next.order : null;
  let ord;
  if(po!=null && no!=null) ord = (po+no)/2;
  else if(po!=null) ord = po+1000;
  else if(no!=null) ord = no-1000;
  else ord = 0;
  store.upsert(file, { id:movedId, order:ord });
  log("SAVE","reorder "+file+" -> order "+ord);
}

/* ============================================================
   VIEW: TODAY  (+ entry to Now/Focus)
   ============================================================ */
function TodayView({ store, onOpen, goNow, typeFilter, del }){
  let items = todayItems(store.data.todos).filter(t=>typeFilter==="all"||t.type===typeFilter).sort(sortTodos);
  const thr = waitThreshold(store);
  const followUps = store.data.todos
    .filter(t=>t.status==="waiting" && (typeFilter==="all"||t.type===typeFilter))
    .map(t=>({ t, d:waitingDays(t) }))
    .filter(x=>x.d!=null && x.d>=thr)
    .sort((a,b)=>b.d-a.d)
    .map(x=>x.t);
  const staleIdeas = store.data.ideas.filter(i=>{
    if(i.state==="promoted"||i.state==="discarded") return false;
    const age = (Date.now()-new Date(i.capturedAt||i.createdAt||Date.now()))/86400000;
    return age>=30;
  });
  const d = new Date();
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <div className="eyebrow">{d.toLocaleDateString(undefined,{weekday:"long"})}</div>
        <div className="topbar-row"><h1 className="title">Today</h1>
          <button className="btn btn-ghost btn-sm" onClick={goNow}>{Ic.now} Focus</button></div>
        <div className="subtle" style={{marginTop:2}}>{d.toLocaleDateString(undefined,{month:"long",day:"numeric"})}</div>
      </div>
      {followUps.length>0 &&
        <div style={{marginTop:14}}>
          <div className="label" style={{display:"flex",alignItems:"center",gap:6}}>{Ic.clock} Follow up - waiting {thr}+ days</div>
          <div className="list" style={{marginTop:8}}>{followUps.map(t=><SwipeRow key={t.id} onDelete={()=>del("todos",t)}><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/></SwipeRow>)}</div>
        </div>}
      {staleIdeas.length>0 &&
        <div className="card" style={{marginTop:14,borderColor:"var(--amber-line)",background:"var(--amber-dim)"}}>
          <b style={{fontFamily:"Fraunces",fontSize:15}}>Revisit your ideas</b>
          <p className="hint" style={{marginTop:4}}>{staleIdeas.length} idea{staleIdeas.length===1?"":"s"} untouched 30+ days. A quick review keeps the system trusted.</p>
        </div>}
      {items.length===0 ? <Empty glyph={"\u2600"} title="Nothing scheduled" sub="Star items for today, or set a due date."/> :
        <div className="list">{items.map(t=><SwipeRow key={t.id} onDelete={()=>del("todos",t)}><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/></SwipeRow>)}</div>}
    </div>
  );
}

/* ============================================================
   VIEW: NOW / FOCUS  (single next action)
   ============================================================ */
function NowView({ store, onOpen, back }){
  const candidates = store.data.todos
    .filter(t=>t.status==="next"||todayItems([t]).length>0)
    .filter(t=>t.status!=="done").sort(sortTodos);
  const [idx,setIdx]=useState(0);
  const t = candidates[idx];
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Now</h1>
      </div>
      {!t ? <Empty glyph={"\u25CB"} title="All clear" sub="No next action queued. Nice."/> :
        <div style={{marginTop:30}}>
          <div className="card" style={{padding:24,textAlign:"center"}}>
            <div className="subtle" style={{marginBottom:10}}>{t.quad?QUADRANTS[t.quad].label:"Next action"}</div>
            <h2 style={{fontSize:24,lineHeight:1.25}}>{t.title}</h2>
            {t.notes && <p className="hint" style={{marginTop:10}}>{t.notes}</p>}
          </div>
          <button className="btn btn-primary btn-block" style={{marginTop:18}}
            onClick={()=>{ store.completeTodo(t); setIdx(0); }}>Mark done</button>
          <div className="row" style={{marginTop:10}}>
            <button className="btn btn-ghost" onClick={()=>setIdx((idx+1)%candidates.length)}>Skip</button>
            <button className="btn btn-ghost" onClick={()=>onOpen(t)}>Edit</button>
          </div>
          <p className="hint center" style={{marginTop:14}}>{idx+1} of {candidates.length}</p>
        </div>}
    </div>
  );
}

/* ============================================================
   VIEW: LISTS  (GTD statuses, filterable)
   ============================================================ */
function ListsView({ store, onOpen, typeFilter, setTypeFilter, locFilter, setLocFilter, del, toast }){
  const TABS = ["all", ...STATUS_ORDER];     // "all" = every active to-do in one list
  const [tab,setTab]=useState("all");
  const [sortMode,setSortMode]=useState(()=>lsGet("todoSort","manual")); // 'manual' = your drag order, 'smart' = priority/due
  useEffect(()=>{ lsSet("todoSort", sortMode); },[sortMode]);
  const [showDone,setShowDone]=useShowDone();  // show/hide completed on the combined "all" list
  // Bulk multi-select: tap "Select", tick items, then act on all at once.
  const [selMode,setSelMode]=useState(false);
  const [sel,setSel]=useState(()=>new Set());
  const [bulkSnooze,setBulkSnooze]=useState(false);
  const [bulkMoveOpen,setBulkMoveOpen]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const byId = (id) => store.data.todos.find(t=>t.id===id);
  const toggleSel = (id) => setSel(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const exitSel = () => { setSelMode(false); setSel(new Set()); setBulkSnooze(false); setBulkMoveOpen(false); setConfirmDel(false); };
  function bulkComplete(){ sel.forEach(id=>{ const t=byId(id); if(t && t.status!=="done") store.completeTodo(t); }); exitSel(); }
  function bulkDelete(){ sel.forEach(id=>store.remove("todos", id)); exitSel(); }
  // Re-file every selected todo under `pid` ("" = unfile). `label` is passed from the
  // MoveSheet so the toast is correct even for a just-created project.
  function bulkMove(pid, label){ const n=sel.size; sel.forEach(id=>{ const t=byId(id); if(t) store.upsert("todos",{ id:t.id, projectId:pid }); }); exitSel(); if(toast) toast("Moved "+n+" to "+label); }
  const locs = knownLocations(store);
  // A location filter shows that place's items PLUS "anywhere" (blank) items - GTD contexts.
  const matchLoc = (t) => locFilter==="all" || !t.location || t.location===locFilter;
  const passType = (t) => typeFilter==="all"||t.type===typeFilter;
  const counts = {};
  counts.all = store.data.todos.filter(t=>t.status!=="done"&&passType(t)&&matchLoc(t)&&!isDeferredAway(t)).length;
  STATUS_ORDER.forEach(s=>{ counts[s]=store.data.todos.filter(t=>t.status===s&&passType(t)&&matchLoc(t)).length; });
  let items = store.data.todos
    .filter(t=> (tab==="all" ? t.status!=="done" : t.status===tab) && passType(t) && matchLoc(t))
    .filter(t=> (tab==="someday"||tab==="done") ? true : !isDeferredAway(t))
    .sort(sortMode==="smart" ? sortTodos : byOrder);
  // Completed to-dos for the "all" list: counted always (drives the toggle label),
  // but only rendered when "Show done" is on. Kept out of the DragList so completing
  // an item never disturbs the manual drag order of active work.
  const doneAll = store.data.todos.filter(t=>t.status==="done"&&passType(t)&&matchLoc(t)).sort(sortTodos);
  const doneItems = (tab==="all" && showDone) ? doneAll : [];
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <div className="eyebrow">Organize</div>
        <div className="topbar-row"><h1 className="title">To-Dos</h1>
          <button className="btn btn-ghost btn-sm" onClick={()=>{ if(selMode) exitSel(); else setSelMode(true); }}>{selMode?"Cancel":"Select"}</button></div>
      </div>
      <div className="pills">
        {["all",...knownCategories(store)].map(f=><button key={f} className={"pill"+(typeFilter===f?" on":"")} onClick={()=>setTypeFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {locs.length>0 &&
        <div className="pills">
          <button className={"pill"+(locFilter==="all"?" on":"")} onClick={()=>setLocFilter("all")}>Any place</button>
          {locs.map(l=><button key={l} className={"pill"+(locFilter===l?" on":"")} onClick={()=>setLocFilter(l)}>{l}</button>)}
        </div>}
      <div className="tabs">
        {TABS.map(s=><button key={s} className={"tab"+(tab===s?" on":"")} onClick={()=>setTab(s)}>{s[0].toUpperCase()+s.slice(1)} {counts[s]>0&&<span style={{opacity:.6}}>{counts[s]}</span>}</button>)}
      </div>
      {!selMode &&
        <div className="sortrow">
          <div className="seg">
            <button className={"seg-b"+(sortMode==="manual"?" on":"")} onClick={()=>setSortMode("manual")}>Manual</button>
            <button className={"seg-b"+(sortMode==="smart"?" on":"")} onClick={()=>setSortMode("smart")}>Smart</button>
          </div>
          <span className="sortlbl">{sortMode==="manual" ? "Your drag order - hold the grip to reorder" : "Auto: priority, then due date"}</span>
        </div>}
      {tab==="all" && <DoneToggle showDone={showDone} setShowDone={setShowDone} n={doneAll.length}/>}
      {locFilter!=="all" && <p className="hint" style={{marginTop:8}}>Showing {locFilter} + any-place items.</p>}
      {items.length===0 && doneItems.length===0 ? <Empty glyph={"\u2014"} title={tab==="all"?"No to-dos yet":"No "+tab+" items"} sub={tab==="inbox"||tab==="all"?"Capture with the + button.":"Move items here as you organize."}/> :
        selMode ?
          <div className="list">
            {items.map(t=>{ const on=sel.has(t.id);
              return <div key={t.id} onClick={()=>toggleSel(t.id)} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",borderRadius:12,padding:"1px 4px",background:on?"var(--amber-dim)":"transparent"}}>
                <span style={{flex:"0 0 auto",width:24,height:24,borderRadius:"50%",display:"inline-flex",alignItems:"center",justifyContent:"center",border:"2px solid "+(on?"var(--amber)":"var(--line-2)"),background:on?"var(--amber)":"transparent",color:"var(--bg)"}}>{on && Ic.check}</span>
                <div style={{flex:1,pointerEvents:"none"}}><TodoRow store={store} todo={t} onOpen={()=>{}}/></div>
              </div>; })}
            <div style={{height:72}}></div>
          </div>
        :
        <>
          {items.length>0 && <DragList items={items} getId={t=>t.id} reorderable={sortMode==="manual"} onReorder={(id,ids)=>reorderItem(store,"todos",id,ids,items)} onDelete={t=>del("todos",t)}
            render={t=><TodoRow store={store} todo={t} onOpen={()=>onOpen(t)}/>}/>}
          {doneItems.length>0 && <>
            <div className="sortlbl" style={{margin:"16px 4px 8px"}}>Completed</div>
            <div className="list">{doneItems.map(t=><TodoRow key={t.id} store={store} todo={t} onOpen={()=>onOpen(t)}/>)}</div>
          </>}
        </>}
      {selMode &&
        <div style={{position:"fixed",left:0,right:0,bottom:"calc(var(--nav-h) + env(safe-area-inset-bottom))",zIndex:45,background:"var(--bg-2)",borderTop:"1px solid var(--line)",padding:"10px 16px",display:"flex",gap:6,rowGap:8,flexWrap:"wrap",alignItems:"center"}}>
          <span className="label" style={{marginRight:"auto"}}>{sel.size} selected</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setSel(sel.size===items.length&&items.length?new Set():new Set(items.map(t=>t.id)))}>{sel.size===items.length&&items.length?"Clear":"All"}</button>
          <button className="btn btn-ghost btn-sm" disabled={!sel.size} onClick={bulkComplete}>Done</button>
          <button className="btn btn-ghost btn-sm" disabled={!sel.size} onClick={()=>sel.size&&setBulkSnooze(true)}>Snooze</button>
          <button className="btn btn-ghost btn-sm" disabled={!sel.size} onClick={()=>sel.size&&setBulkMoveOpen(true)}>Move</button>
          <button className="btn btn-ghost btn-sm" disabled={!sel.size} style={{color:"var(--danger,#d9744f)"}} onClick={()=>sel.size&&setConfirmDel(true)}>Delete</button>
        </div>}
      {bulkSnooze && <SnoozeSheet onPick={(iso)=>{ sel.forEach(id=>{ const t=byId(id); if(t) snoozeTodo(store,t,iso); }); exitSel(); }} onClose={()=>setBulkSnooze(false)}/>}
      {bulkMoveOpen && <MoveSheet store={store} onPick={bulkMove} onClose={()=>setBulkMoveOpen(false)}/>}
      {confirmDel && <Confirm text={"Delete "+sel.size+" item"+(sel.size===1?"":"s")+"? This can't be undone."} confirmLabel="Delete" onConfirm={bulkDelete} onCancel={()=>setConfirmDel(false)}/>}
    </div>
  );
}

/* ============================================================
   VIEW: MATRIX (Eisenhower)
   ============================================================ */
function MatrixView({ store, onOpen, typeFilter, setTypeFilter, locFilter, setLocFilter }){
  const locs = knownLocations(store);
  const matchLoc = (t) => locFilter==="all" || !t.location || t.location===locFilter;
  const active = store.data.todos.filter(t=>t.status!=="done"&&t.status!=="someday"&&!isDeferredAway(t)&&(typeFilter==="all"||t.type===typeFilter)&&matchLoc(t));
  const byQ = {q1:[],q2:[],q3:[],q4:[]};
  active.forEach(t=>{ if(t.quad&&byQ[t.quad]) byQ[t.quad].push(t); });
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <div className="eyebrow">Prioritize</div><h1 className="title">Matrix</h1>
        <div className="subtle" style={{marginTop:2}}>Eisenhower: urgent x important</div>
      </div>
      <div className="pills">
        {["all",...knownCategories(store)].map(f=><button key={f} className={"pill"+(typeFilter===f?" on":"")} onClick={()=>setTypeFilter(f)}>{f[0].toUpperCase()+f.slice(1)}</button>)}
      </div>
      {locs.length>0 &&
        <div className="pills">
          <button className={"pill"+(locFilter==="all"?" on":"")} onClick={()=>setLocFilter("all")}>Any place</button>
          {locs.map(l=><button key={l} className={"pill"+(locFilter===l?" on":"")} onClick={()=>setLocFilter(l)}>{l}</button>)}
        </div>}
      <div className="matrix">
        {Object.entries(QUADRANTS).map(([k,v])=>
          <div key={k} className={"quad "+v.cls}>
            <div className="quad-head"><b>{v.label}</b><span className="quad-count">{byQ[k].length}</span></div>
            <div className="subtle" style={{fontSize:10,marginTop:-6,marginBottom:8}}>{v.hint}</div>
            {byQ[k].sort(sortTodos).map(t=><div key={t.id} className="quad-item" onClick={()=>onOpen(t)}>{t.title}</div>)}
            {byQ[k].length===0 && <div className="subtle" style={{fontSize:11}}>Empty</div>}
          </div>)}
      </div>
      <p className="hint" style={{marginTop:14}}>Unprioritized todos won't appear here. Set a priority in any todo to place it.</p>
    </div>
  );
}

/* ============================================================
   TEMPLATES - reusable checklists. Save a project's open todos as a named template, then
   spin up a fresh project + those items in one tap (e.g. a packing list per trip). Stored
   in the meta object (no backend change).
   ============================================================ */
function SaveTemplateSheet({ store, defaultName, items, onClose, toast }){
  const [name,setName]=useState(defaultName||"");
  const clean = (items||[]).map(s=>String(s||"").trim()).filter(Boolean);
  function save(){
    const n=name.trim(); if(!n){ toast&&toast("Name the template"); return; }
    if(!clean.length){ toast&&toast("No open items to save"); return; }
    const existing = store.templates||[];
    const without = existing.filter(t=>(t.name||"").toLowerCase()!==n.toLowerCase());   // same name -> replace
    store.saveTemplates([...without, { id:uid(), name:n, items:clean }]);
    toast&&toast("Saved template \""+n+"\" ("+clean.length+" item"+(clean.length===1?"":"s")+")");
    onClose();
  }
  return (
    <Sheet title="Save as template" onClose={onClose}>
      <div className="field"><span className="label">Template name</span>
        <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Packing" autoFocus/></div>
      <p className="hint" style={{marginTop:6}}>Saves this project's {clean.length} open item{clean.length===1?"":"s"} as a reusable checklist. Reuse it later with "New from template". Saving with an existing name replaces it.</p>
      <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={save}>Save template</button>
    </Sheet>
  );
}
function TemplatesEditor({ store, toast }){
  const list = store.templates||[];
  if(!list.length) return <p className="hint" style={{margin:0}}>No templates yet. Open a project and tap <b>Template</b> to save its checklist (like a packing list you reuse each trip).</p>;
  function rename(id, v){ const n=(v||"").trim(); if(n) store.saveTemplates(list.map(t=>t.id===id?{...t,name:n}:t)); }
  function del(id){ store.saveTemplates(list.filter(t=>t.id!==id)); toast&&toast("Template deleted"); }
  return (
    <div>
      {list.map(t=>
        <div key={t.id+"|"+t.name} className="row" style={{alignItems:"center",gap:8,background:"var(--bg)",marginBottom:6}}>
          <input className="input" defaultValue={t.name} onBlur={e=>rename(t.id,e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} style={{flex:1,minWidth:90}} aria-label="Template name"/>
          <span className="chip" style={{flex:"0 0 auto"}}>{(t.items||[]).length}</span>
          <button className="btn btn-ghost btn-sm" style={{flex:"0 0 auto"}} onClick={()=>del(t.id)}>Delete</button>
        </div>)}
      <p className="hint" style={{marginTop:6}}>Reuse a template from the <b>+</b> button or the Projects list. Tap a name to rename; the number is its item count.</p>
    </div>
  );
}

/* ============================================================
   VIEW: WEEKLY REVIEW (lightweight guided checklist)
   Steps reset each session; tapping a step jumps to its view.
   ============================================================ */
function WeeklyReview({ store, back, go }){
  const [done,setDone]=useState({});
  const inbox = store.data.todos.filter(t=>t.status==="inbox").length;
  const waiting = store.data.todos.filter(t=>t.status==="waiting").length;
  const someday = store.data.todos.filter(t=>t.status==="someday").length;
  const noNext = store.data.projects.filter(p=>p.status==="active" &&
    store.data.todos.filter(t=>t.projectId===p.id&&t.status==="next").length===0).length;
  const steps = [
    { k:"inbox", b:"Process Inbox to zero", p:inbox+" item"+(inbox===1?"":"s")+" waiting", go:()=>go("lists") },
    { k:"next", b:"Review Next actions", p:"Still the right next steps?", go:()=>go("lists") },
    { k:"waiting", b:"Review Waiting-for", p:waiting+" item"+(waiting===1?"":"s")+" - nudge anyone?", go:()=>go("lists") },
    { k:"someday", b:"Review Someday / maybe", p:someday+" parked - anything ready to activate?", go:()=>go("lists") },
    { k:"projects", b:"Every active project has a next action", p:noNext>0? noNext+" project"+(noNext===1?"":"s")+" missing one":"All projects covered", go:()=>go("projects") },
    { k:"goals", b:"Glance at your goals", p:"Are projects still serving them?", go:()=>go("goals") },
  ];
  const completed = Object.values(done).filter(Boolean).length;
  return (
    <div className="screen">
      <div className="topbar" style={{padding:0,position:"static"}}>
        <button className="btn btn-ghost btn-sm" onClick={back}>{Ic.back} Back</button>
        <h1 className="title" style={{marginTop:8}}>Weekly Review</h1>
        <div className="subtle" style={{marginTop:2}}>{completed} of {steps.length} done - GTD's keystone habit</div>
      </div>
      <div className="steps">
        {steps.map((s,i)=>
          <div key={s.k} className={"step"+(done[s.k]?" done":"")}>
            <button className="step-n" onClick={()=>setDone({...done,[s.k]:!done[s.k]})}>{done[s.k]?Ic.check:i+1}</button>
            <div style={{flex:1}} onClick={s.go}><b>{s.b}</b><p>{s.p}</p></div>
          </div>)}
      </div>
      {completed===steps.length && <div className="card center" style={{marginTop:16,borderColor:"var(--amber-line)"}}>
        <b style={{fontFamily:"Fraunces",fontSize:17}}>Review complete</b><p className="hint" style={{marginTop:4}}>Mind like water. See you next week.</p></div>}
    </div>
  );
}

/* ============================================================
   EDITABLE LABEL ROW (shared by Locations + Categories editors)
   - Edits in a local buffer; commits on blur / Enter (so a rename is one
     deliberate change, not one per keystroke).
   - Commit cascades: every item tagged with the old value is relabeled.
   - Delete is by swiping the row left (no X button - swipe handles it).
   ============================================================ */
function EditableLabelRow({ value, color, count, onCommit, onRemove }){
  const [v,setV]=useState(value);
  const [confirm,setConfirm]=useState(false);
  useEffect(()=>{ setV(value); },[value]);
  const commit=()=>{ const t=v.trim(); if(!t || t===value){ setV(value); return; } onCommit(t); };
  return (
    <div style={{marginBottom:8}}>
      <SwipeRow onDelete={()=>setConfirm(true)}>
        <div className="row" style={{alignItems:"center",background:"var(--bg)"}}>
          {color && <span className="chip" style={{flex:"0 0 auto",background:color+"22",color,border:"1px solid "+color+"55"}}>{value||"?"}</span>}
          <input className="input" value={v} style={{flex:1}} aria-label="Rename" onChange={e=>setV(e.target.value)} onBlur={commit}
            onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}/>
        </div>
      </SwipeRow>
      {confirm && <Confirm
        text={count>0 ? ("Delete \""+value+"\"? It will be cleared from "+count+" item"+(count===1?"":"s")+" (they become uncategorized).")
                      : ("Delete \""+value+"\"?")}
        confirmLabel="Delete" onConfirm={()=>{ onRemove(); setConfirm(false); }} onCancel={()=>setConfirm(false)}/>}
    </div>
  );
}
// How many items currently carry a given category(type)/location value. Uses allData:
// category/location management is global (every Space), not scoped to the active one.
function countUses(store, field, val){
  let n=0; FILES.forEach(f=>((store.allData||store.data)[f]||[]).forEach(x=>{ if(x[field]===val) n++; })); return n;
}

   MANAGE SPACES editor (Settings): add / rename / recolor / reorder / archive.
   Reuses the list + DragList patterns. Spaces live in meta via store.saveSpaces.

/* ============================================================
   MANAGE CALENDARS (Settings): add / rename / recolor / reassign Space / enable /
   delete .ics feeds. These are NOT in the synced store - they live server-side
   because the feed URL is a secret. We send the URL once and only ever get back
   { id, name, space, color, enabled, host_hint }.
   ============================================================ */
function CalendarsEditor({ store, toast }){
  const spaces = (store.spaces||[]).filter(s=>!s.archived).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const defSpace = (store.activeSpace && store.activeSpace!=="all") ? store.activeSpace : (store.defaultSpace||DEFAULT_SPACE);
  const [feeds,setFeeds]=useState(null);      // null = still loading
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [name,setName]=useState("");
  const [url,setUrl]=useState("");
  const [space,setSpace]=useState(defSpace);
  const [color,setColor]=useState("#6f9bc4");

  const load = useCallback(async ()=>{
    setErr("");
    try{ const j = await calFeedsGet(); setFeeds((j && j.feeds) || []); }
    catch(e){ setErr(e.message||"Couldn't load calendars."); setFeeds([]); }
  },[]);
  useEffect(()=>{ load(); },[load]);

  async function add(){
    const n=name.trim(), u=url.trim();
    if(!n){ toast&&toast("Name the calendar"); return; }
    if(!u){ toast&&toast("Paste the .ics URL"); return; }
    setBusy(true); setErr("");
    try{
      const f = await calFeedAdd({ name:n, url:u, space, color });
      setUrl(""); setName("");                 // clear the secret out of the form immediately
      setFeeds(list=>[...(list||[]), f]);
      toast&&toast("Added \""+f.name+"\"");
    }catch(e){ setErr(e.message||"Couldn't add that feed."); }
    finally{ setBusy(false); }
  }
  async function patch(id, changes){
    try{
      const updated = await calFeedPatch(id, changes);
      setFeeds(list=>(list||[]).map(f=>f.id===id?updated:f));
    }catch(e){ setErr(e.message||"Update failed."); }
  }
  async function del(id, nm){
    try{
      await calFeedDelete(id);
      setFeeds(list=>(list||[]).filter(f=>f.id!==id));
      toast&&toast("Removed \""+nm+"\"");
    }catch(e){ setErr(e.message||"Delete failed."); }
  }

  return (
    <div>
      {err && <p className="hint danger-text" style={{marginTop:0}}>{err}</p>}
      {feeds===null && <p className="hint" style={{margin:0}}>Loading calendars...</p>}
      {feeds && feeds.length===0 && !err && <p className="hint" style={{margin:0}}>No calendars yet. Add one below.</p>}
      {feeds && feeds.map(f=>(
        <div key={f.id} className="row" style={{alignItems:"center",gap:8,flexWrap:"wrap",background:"var(--bg)",marginBottom:8}}>
          <input type="color" value={f.color||"#6f9bc4"} onChange={e=>patch(f.id,{color:e.target.value})} aria-label="Calendar color"
            style={{flex:"0 0 auto",width:34,height:34,padding:2,border:"1px solid var(--line-2)",borderRadius:9,background:"transparent"}}/>
          <input className="input" defaultValue={f.name} key={f.id+"|"+f.name} aria-label="Calendar name"
            onBlur={e=>{ const v=e.target.value.trim(); if(v && v!==f.name) patch(f.id,{name:v}); }}
            onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} style={{flex:1,minWidth:110}}/>
          {spaces.length>0 &&
            <select className="select" style={{flex:"0 0 auto",width:120}} value={f.space} onChange={e=>patch(f.id,{space:e.target.value})}>
              {spaces.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>}
          <button className="btn btn-ghost btn-sm" style={{flex:"0 0 auto"}} onClick={()=>patch(f.id,{enabled:!f.enabled})}>{f.enabled?"On":"Off"}</button>
          <button className="btn btn-ghost btn-sm" style={{flex:"0 0 auto"}} onClick={()=>del(f.id,f.name)}>Delete</button>
          {f.host_hint && <span className="chip" style={{flex:"0 0 auto"}}>{f.host_hint}</span>}
        </div>
      ))}

      <div className="divider"></div>
      <div className="field">
        <span className="label">Add a calendar</span>
        <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Name (e.g. RTR work)" autoCapitalize="words"/>
        <input className="input" style={{marginTop:8}} value={url} onChange={e=>setUrl(e.target.value)}
          placeholder="Paste the .ics feed URL" autoCapitalize="none" autoCorrect="off" spellCheck="false"/>
        <div className="row" style={{marginTop:8,alignItems:"center"}}>
          {spaces.length>0 &&
            <select className="select" style={{flex:1}} value={space} onChange={e=>setSpace(e.target.value)}>
              {spaces.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>}
          <input type="color" value={color} onChange={e=>setColor(e.target.value)} aria-label="New calendar color"
            style={{flex:"0 0 auto",width:34,height:34,padding:2,border:"1px solid var(--line-2)",borderRadius:9,background:"transparent"}}/>
          <button className="btn btn-primary btn-sm" style={{flex:"0 0 auto"}} disabled={busy} onClick={add}>{busy? <span className="spin"></span> : "Add"}</button>
        </div>
      </div>
      <p className="hint" style={{marginTop:6}}>Google Calendar &gt; Settings &gt; pick a calendar &gt; Integrate calendar &gt; <b>Secret address in iCal format</b>. The URL is stored on the server and never shown again - only its host is displayed here.</p>
      <p className="hint" style={{marginTop:6}}>Heads up: Google refreshes these secret .ics feeds on its own schedule, so very recent edits can take a while to show up.</p>
    </div>
  );
}

function SpacesEditor({ store, toast }){
  const all = (store.spaces||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const active = all.filter(s=>!s.archived);
  const archived = all.filter(s=>s.archived);
  const def = store.defaultSpace;
  const [adding,setAdding]=useState("");
  const patch = (id, changes) => store.saveSpaces(all.map(s=>s.id===id?{...s,...changes}:s));
  function rename(id, v){ const n=(v||"").trim(); if(n) patch(id,{name:n}); }
  function archive(id){
    if(id===def){ toast&&toast("Make another Space the default first"); return; }
    store.saveSpaces(all.map(s=>s.id===id?{...s,archived:true}:s));
    if(store.activeSpace===id) store.setActiveSpace("all");
    toast&&toast("Space archived");
  }
  function reorder(movedId, newIds){
    const om={}; newIds.forEach((id,i)=>om[id]=i*10); let base=newIds.length*10;
    store.saveSpaces(all.map(s => om[s.id]!==undefined ? {...s,order:om[s.id]} : {...s,order:base++}));
  }
  function add(){
    const n=adding.trim(); if(!n) return;
    if(all.some(s=>(s.name||"").toLowerCase()===n.toLowerCase())){ toast&&toast("A Space with that name exists"); return; }
    const color = ACCENT_PRESETS[all.length % ACCENT_PRESETS.length];
    const order = (active.length?Math.max(...active.map(s=>s.order||0)):0)+10;
    store.saveSpaces([...all, { id:uid(), name:n, color, order, archived:false }]);
    setAdding("");
  }
  const Row = (s) => (
    <div className="row" style={{alignItems:"center",gap:8,flexWrap:"wrap",background:"var(--bg)"}}>
      <input type="color" value={s.color||"#6f9bc4"} onChange={e=>patch(s.id,{color:e.target.value})}
        aria-label="Space color" style={{flex:"0 0 auto",width:34,height:34,padding:2,border:"1px solid var(--line-2)",borderRadius:9,background:"transparent"}}/>
      <input className="input" defaultValue={s.name} key={s.id+"|"+s.name} onBlur={e=>rename(s.id,e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }} style={{flex:1,minWidth:110}} aria-label="Space name"/>
      {def===s.id
        ? <span className="chip amber" style={{flex:"0 0 auto"}}>Default</span>
        : <button className="btn btn-ghost btn-sm" style={{flex:"0 0 auto"}} onClick={()=>store.setDefaultSpaceId(s.id)}>Make default</button>}
      <button className="btn btn-ghost btn-sm" style={{flex:"0 0 auto"}} onClick={()=>archive(s.id)}>Archive</button>
    </div>
  );
  return (
    <div>
      <DragList items={active} getId={s=>s.id} reorderable={active.length>1} onReorder={reorder} render={Row}/>
      <div className="row" style={{marginTop:6}}>
        <input className="input" value={adding} onChange={e=>setAdding(e.target.value)} placeholder="Add a Space"
          onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:3}} autoCapitalize="words"/>
        <button className="btn btn-ghost btn-sm" onClick={add} style={{flex:1}}>Add</button>
      </div>
      <p className="hint" style={{marginTop:6}}>Drag to reorder. Tap a name to rename, or the swatch to recolor. Archiving hides a Space (its items keep it); the default can't be archived.</p>
      {archived.length>0 && <>
        <div className="set-group">Archived</div>
        {archived.map(s=>
          <div key={s.id} className="row" style={{alignItems:"center",gap:8,background:"var(--bg)",marginBottom:6}}>
            <span className="space-dot" style={{background:s.color,marginLeft:4}}></span>
            <span style={{flex:1,color:"var(--ink-3)"}}>{s.name}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>patch(s.id,{archived:false})}>Unarchive</button>
          </div>)}
      </>}
    </div>
  );
}

function LocationsEditor({ store, toast, toastUndo }){
  const list = knownLocations(store);   // union: configured + any in use, so the editor matches the filter pills
  const cfgList = (store.cfg.locations && store.cfg.locations.length) ? store.cfg.locations : DEFAULT_LOCATIONS;
  const [adding,setAdding]=useState("");
  const [merge,setMerge]=useState(null);
  const [seed,setSeed]=useState(0);
  function persist(next){ store.saveCfg({ ...store.cfg, locations: next }); }
  function add(){
    const v = adding.trim(); if(!v) return;
    if(list.includes(v)){ toast("Already in the list"); return; }
    persist([...cfgList, v]); setAdding(""); log("NAV","location added");
  }
  function commit(old, v){
    if(old===v) return;
    if(list.includes(v)){ setMerge({from:old, to:v}); return; }
    persist(cfgList.includes(old) ? cfgList.map(x=>x===old?v:x) : [...cfgList, v]); // adopt in-use-but-unlisted names
    const n = store.relabel("location", old, v);
    toast(n>0 ? ("Renamed - updated "+n+" item"+(n===1?"":"s")) : "Renamed");
  }
  function doMerge(){
    const {from,to}=merge; const prevCfg=store.cfg;
    const affected=[]; FILES.forEach(f=>((store.allData||store.data)[f]||[]).forEach(x=>{ if(x.location===from) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==from));
    const n=store.relabel("location", from, to);
    setMerge(null); setSeed(s=>s+1);
    toastUndo("Merged \""+from+"\" into \""+to+"\""+(n?(" - "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);
      if(affected.length) store.restoreLabel("location", affected, from);
    });
  }
  function cancelMerge(){ setMerge(null); setSeed(s=>s+1); }
  function remove(val){
    const prevCfg = store.cfg;
    const affected = []; FILES.forEach(f => ((store.allData||store.data)[f]||[]).forEach(x => { if(x.location===val) affected.push({file:f,id:x.id}); }));
    persist(cfgList.filter(x=>x!==val));
    const n = store.relabel("location", val, "");
    toastUndo("Deleted \""+val+"\""+(n?(" - cleared "+n+" item"+(n===1?"":"s")):""), ()=>{
      store.saveCfg(prevCfg);
      if(affected.length) store.restoreLabel("location", affected, val);
    });
  }
  return (
    <div>
      {list.map((l)=>
        <EditableLabelRow key={l+"|"+seed} value={l} count={countUses(store,"location",l)}
          onCommit={v=>commit(l,v)} onRemove={()=>remove(l)}/>)}
      <div className="row" style={{marginTop:6}}>
        <input className="input" value={adding} onChange={e=>setAdding(e.target.value)} placeholder="Add a place / context"
          onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:3}} autoCapitalize="words"/>
        <button className="btn btn-ghost btn-sm" onClick={add} style={{flex:1}}>Add</button>
      </div>
      <p className="hint" style={{marginTop:6}}>Tap a name to rename it (updates every todo using it). Rename one onto another's name to merge them. Swipe a row left to delete.</p>
      {merge && <Confirm
        text={"Merge \""+merge.from+"\" into \""+merge.to+"\"? Every todo tagged \""+merge.from+"\" becomes \""+merge.to+"\", and \""+merge.from+"\" is removed."}
        confirmLabel="Merge" onConfirm={doMerge} onCancel={cancelMerge}/>}
    </div>
  );
}

    const affected = []; FILES.forEach(f => ((store.allData||store.data)[f]||[]).forEach(x => { if(x.type===val) affected.push({file:f,id:x.id}); }));

  return (
    <div>
      {list.map((l)=>
        <EditableLabelRow key={l+"|"+seed} value={l} color={catHue(l)} count={countUses(store,"type",l)}

      {merge && <Confirm
        text={"Merge \""+merge.from+"\" into \""+merge.to+"\"? Every item tagged \""+merge.from+"\" becomes \""+merge.to+"\", and \""+merge.from+"\" is removed."}
        confirmLabel="Merge" onConfirm={doMerge} onCancel={cancelMerge}/>}
